<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08070b" />
    <title>给江大美女的一束光</title>
    <meta name="description" content="今晚，想请你看一束只为你亮起的光。" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #08070b;
        --paper: #fffaf6;
        --soft: rgba(255, 250, 246, 0.68);
        --rose: #f49aaa;
        --rose-bright: #ffd1d8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--ink);
        color: var(--paper);
        font-family:
          "PingFang SC",
          "Microsoft YaHei",
          "Noto Sans CJK SC",
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      button,
      a {
        font: inherit;
      }

      .gate {
        position: relative;
        display: grid;
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        overflow: hidden;
        padding:
          max(34px, env(safe-area-inset-top))
          max(24px, env(safe-area-inset-right))
          max(34px, env(safe-area-inset-bottom))
          max(24px, env(safe-area-inset-left));
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 20%, rgba(77, 63, 91, 0.2), transparent 34%),
          linear-gradient(180deg, #09080c 0%, #100b12 62%, #08070b 100%);
      }

      #nightSky {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
      }

      .veil {
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(180deg, transparent 54%, rgba(8, 7, 11, 0.42) 78%, rgba(8, 7, 11, 0.72) 100%),
          radial-gradient(circle at 50% 47%, transparent 0 32%, rgba(8, 7, 11, 0.34) 78%);
        pointer-events: none;
      }

      .invitation {
        display: grid;
        width: min(34rem, 100%);
        justify-items: center;
        gap: 0;
        text-align: center;
      }

      .light-seed {
        position: relative;
        width: 8.5rem;
        height: 8.5rem;
        margin-bottom: 2.4rem;
        animation: seed-float 5s ease-in-out infinite;
      }

      .light-seed::before {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #fff;
        box-shadow:
          0 0 8px #fff,
          0 0 22px rgba(255, 209, 216, 0.95),
          0 0 54px rgba(244, 154, 170, 0.55),
          0 0 92px rgba(244, 154, 170, 0.24);
        content: "";
        transform: translate(-50%, -50%);
        animation: seed-breathe 2.8s ease-in-out infinite;
      }

      .light-seed::after {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 76%;
        height: 32%;
        border-top: 1px solid rgba(255, 209, 216, 0.18);
        border-radius: 50%;
        content: "";
        transform: translate(-50%, -50%) rotate(-13deg);
        filter: drop-shadow(0 0 6px rgba(244, 154, 170, 0.24));
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 0.72rem;
        margin: 0 0 1.15rem;
        color: rgba(255, 250, 246, 0.52);
        font-size: 0.74rem;
        letter-spacing: 0;
      }

      .eyebrow::before,
      .eyebrow::after {
        width: 1.35rem;
        height: 1px;
        background: rgba(244, 154, 170, 0.45);
        content: "";
      }

      h1 {
        margin: 0;
        font-size: clamp(2.05rem, 8.6vw, 4.4rem);
        font-weight: 560;
        line-height: 1.32;
        letter-spacing: 0;
        text-wrap: balance;
        text-shadow: 0 12px 42px rgba(0, 0, 0, 0.38);
      }

      h1 .name {
        display: block;
        margin-bottom: 0.25rem;
        color: var(--rose-bright);
        font-size: 0.58em;
        font-weight: 500;
      }

      .note {
        max-width: 24rem;
        margin: 1.3rem 0 0;
        color: var(--soft);
        font-size: clamp(0.95rem, 3.5vw, 1.08rem);
        line-height: 1.9;
      }

      .open-button {
        display: inline-flex;
        min-width: 10.5rem;
        min-height: 3.4rem;
        align-items: center;
        justify-content: center;
        gap: 0.7rem;
        margin-top: 2.25rem;
        border: 1px solid rgba(255, 209, 216, 0.52);
        border-radius: 999px;
        background: rgba(255, 250, 246, 0.96);
        box-shadow:
          0 14px 38px rgba(244, 154, 170, 0.14),
          0 0 0 0 rgba(244, 154, 170, 0.28);
        color: #27161c;
        font-size: 1rem;
        font-weight: 650;
        text-decoration: none;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
        animation: button-halo 3.2s ease-in-out infinite;
        -webkit-tap-highlight-color: transparent;
      }

      .open-button .arrow {
        display: inline-grid;
        width: 1.1rem;
        height: 1.1rem;
        place-items: center;
        color: #9e5262;
        font-size: 1.2rem;
        line-height: 1;
        transform: translateY(-1px);
      }

      .open-button:active {
        transform: scale(0.97);
      }

      .invitation > * {
        opacity: 0;
        animation: arrive 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .invitation .light-seed {
        animation:
          arrive 1.1s 80ms cubic-bezier(0.22, 1, 0.36, 1) forwards,
          seed-float 5s 1.2s ease-in-out infinite;
      }

      .eyebrow {
        animation-delay: 340ms;
      }

      h1 {
        animation-delay: 510ms;
      }

      .note {
        animation-delay: 690ms;
      }

      .open-button {
        animation:
          arrive 900ms 870ms cubic-bezier(0.22, 1, 0.36, 1) forwards,
          button-halo 3.2s 1.8s ease-in-out infinite;
      }

      @media (hover: hover) {
        .open-button:hover {
          transform: translateY(-2px);
          box-shadow:
            0 18px 48px rgba(244, 154, 170, 0.22),
            0 0 0 7px rgba(244, 154, 170, 0.08);
        }
      }

      @media (max-height: 650px) {
        .light-seed {
          width: 6rem;
          height: 6rem;
          margin-bottom: 1.2rem;
        }

        .note {
          margin-top: 0.85rem;
        }

        .open-button {
          margin-top: 1.35rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-delay: 0ms !important;
        }
      }

      @keyframes arrive {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes seed-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes seed-breathe {
        0%,
        100% {
          opacity: 0.74;
          transform: translate(-50%, -50%) scale(0.82);
        }

        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.18);
        }
      }

      @keyframes button-halo {
        0%,
        100% {
          box-shadow:
            0 14px 38px rgba(244, 154, 170, 0.14),
            0 0 0 0 rgba(244, 154, 170, 0.22);
        }

        50% {
          box-shadow:
            0 16px 44px rgba(244, 154, 170, 0.2),
            0 0 0 7px rgba(244, 154, 170, 0);
        }
      }
    </style>
  </head>
  <body>
    <main class="gate">
      <canvas id="nightSky" aria-hidden="true"></canvas>
      <div class="veil" aria-hidden="true"></div>
      <section class="invitation" aria-label="一封给江大美女的邀请">
        <div class="light-seed" aria-hidden="true"></div>
        <p class="eyebrow">给你留了一点今晚的星光</p>
        <h1>
          <span class="name">江大美女</span>
          想请你看一束光
        </h1>
        <p class="note">它准备了很久，刚好在你点开的时候盛开。</p>
        <a class="open-button" href="./heart.html?v=romance-1">
          <span>打开看看</span>
          <span class="arrow" aria-hidden="true">›</span>
        </a>
      </section>
    </main>

    <script>
      const canvas = document.querySelector("#nightSky");
      const context = canvas.getContext("2d");
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let stars = [];
      let width = 0;
      let height = 0;
      let ratio = 1;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        ratio = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        context.setTransform(ratio, 0, 0, ratio, 0, 0);

        const count = Math.round(Math.min(180, Math.max(90, (width * height) / 6200)));
        stars = Array.from({ length: count }, (_, index) => ({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() > 0.9 ? Math.random() * 1.15 + 0.45 : Math.random() * 0.55 + 0.18,
          alpha: Math.random() * 0.48 + 0.1,
          phase: Math.random() * Math.PI * 2,
          speed: 0.00035 + Math.random() * 0.00065,
          warm: index % 9 === 0
        }));
      }

      function draw(time) {
        context.clearRect(0, 0, width, height);

        for (const star of stars) {
          const shimmer = reducedMotion ? 0.8 : 0.62 + Math.sin(time * star.speed + star.phase) * 0.38;
          context.fillStyle = star.warm
            ? `rgba(255, 209, 216, ${star.alpha * shimmer})`
            : `rgba(236, 232, 244, ${star.alpha * shimmer})`;
          context.beginPath();
          context.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          context.fill();
        }

        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener("resize", resize, { passive: true });
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
