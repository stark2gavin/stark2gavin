<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>江大美女，来看个小动画么</title>
    <meta name="description" content="一个适合手机观看的粒子爱心小动画。" />
    <style>
      :root {
        --bg: #100817;
        --text: #fff8fb;
        --muted: rgba(255, 248, 251, 0.72);
        --rose: #ff6b9f;
        --gold: #ffd36a;
        --cyan: #62e8ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      .gate {
        position: relative;
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: 28px;
        isolation: isolate;
        background:
          radial-gradient(circle at 24% 18%, rgba(98, 232, 255, 0.22), transparent 28%),
          radial-gradient(circle at 75% 25%, rgba(255, 107, 159, 0.18), transparent 26%),
          radial-gradient(circle at 50% 88%, rgba(255, 211, 106, 0.16), transparent 34%),
          linear-gradient(145deg, #100817 0%, #24122c 48%, #09182b 100%);
      }

      .gate::before {
        position: absolute;
        inset: -20%;
        z-index: -1;
        background:
          linear-gradient(115deg, transparent 28%, rgba(98, 232, 255, 0.12), transparent 48%),
          linear-gradient(245deg, transparent 34%, rgba(255, 107, 159, 0.12), transparent 58%);
        content: "";
        animation: shimmer 7s ease-in-out infinite alternate;
      }

      .stars {
        position: absolute;
        inset: 0;
        z-index: -1;
        overflow: hidden;
      }

      .stars span {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--s);
        height: var(--s);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.72);
        animation: twinkle var(--d) ease-in-out infinite;
        animation-delay: var(--delay);
      }

      .invite {
        display: grid;
        width: min(620px, 100%);
        justify-items: center;
        gap: 26px;
        text-align: center;
      }

      .spark-orbit {
        position: relative;
        width: clamp(144px, 38vw, 190px);
        aspect-ratio: 1;
        animation: float 4.2s ease-in-out infinite;
      }

      .spark-orbit::before {
        position: absolute;
        inset: 24%;
        border-radius: 999px;
        background:
          radial-gradient(circle at 42% 34%, #fff8fb, transparent 11%),
          radial-gradient(circle, rgba(98, 232, 255, 0.95), rgba(98, 232, 255, 0.12) 54%, transparent 68%);
        box-shadow:
          0 0 32px rgba(98, 232, 255, 0.6),
          0 0 78px rgba(255, 107, 159, 0.26);
        content: "";
      }

      .spark-orbit::after {
        position: absolute;
        inset: 9%;
        border: 2px solid rgba(255, 248, 251, 0.32);
        border-right-color: rgba(255, 211, 106, 0.82);
        border-bottom-color: rgba(98, 232, 255, 0.68);
        border-radius: 999px;
        content: "";
        animation: orbit 8s linear infinite;
      }

      h1 {
        width: min(100%, 370px);
        margin: 0;
        font-weight: 850;
        line-height: 1.08;
        letter-spacing: 0;
        text-shadow: 0 14px 42px rgba(0, 0, 0, 0.34);
      }

      h1 span {
        display: block;
      }

      .title-primary {
        font-size: clamp(3.15rem, 12vw, 5.4rem);
      }

      .title-secondary {
        font-size: clamp(2.05rem, 7.8vw, 4.1rem);
        white-space: nowrap;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.06rem, 3.4vw, 1.26rem);
        line-height: 1.8;
      }

      .open-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 208px;
        min-height: 62px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(98, 232, 255, 0.98), rgba(255, 211, 106, 0.98)),
          var(--rose);
        box-shadow:
          0 18px 48px rgba(98, 232, 255, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
        color: #29101b;
        font-size: 1.2rem;
        font-weight: 800;
        text-decoration: none;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .open-button:active {
        transform: translateY(2px) scale(0.98);
      }

      @media (hover: hover) {
        .open-button:hover {
          transform: translateY(-2px);
          box-shadow:
            0 24px 58px rgba(98, 232, 255, 0.34),
            inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
      }

      @keyframes shimmer {
        from {
          transform: translateX(-3%) rotate(0deg);
        }

        to {
          transform: translateX(3%) rotate(4deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        50% {
          transform: translateY(-12px) scale(1.04);
        }
      }

      @keyframes orbit {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(0.62);
        }

        50% {
          opacity: 0.92;
          transform: scale(1.18);
        }
      }
    </style>
  </head>
  <body>
    <main class="gate">
      <div class="stars" aria-hidden="true"></div>
      <section class="invite" aria-label="爱心邀请">
        <div class="spark-orbit" aria-hidden="true"></div>
        <h1>
          <span class="title-primary">江大美女</span>
          <span class="title-secondary">来看个小动画么</span>
        </h1>
        <p class="subtitle">不煽情，就是一片会转的星星。</p>
        <a class="open-button" href="./heart.html?v=landscape-light-1">看一下</a>
      </section>
    </main>
    <script>
      const stars = document.querySelector(".stars");

      for (let index = 0; index < 48; index += 1) {
        const star = document.createElement("span");
        star.style.setProperty("--x", `${(index * 43) % 100}%`);
        star.style.setProperty("--y", `${(index * 67) % 100}%`);
        star.style.setProperty("--s", `${2 + (index % 4)}px`);
        star.style.setProperty("--d", `${3.4 + (index % 5) * 0.45}s`);
        star.style.setProperty("--delay", `${(index % 8) * 0.28}s`);
        stars.appendChild(star);
      }
    </script>
  </body>
</html>
