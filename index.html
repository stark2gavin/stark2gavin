<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>江大美女，想看爱心么</title>
    <meta name="description" content="送给江大美女的一颗心海流光爱心。" />
    <style>
      :root {
        --bg: #100817;
        --text: #fff8fb;
        --muted: rgba(255, 248, 251, 0.72);
        --rose: #ff5a9a;
        --gold: #ffd36a;
        --cyan: #62e8ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      .gate {
        position: relative;
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: 28px;
        isolation: isolate;
        background:
          radial-gradient(circle at 24% 18%, rgba(98, 232, 255, 0.22), transparent 28%),
          radial-gradient(circle at 75% 25%, rgba(255, 90, 154, 0.24), transparent 26%),
          radial-gradient(circle at 50% 88%, rgba(255, 211, 106, 0.16), transparent 34%),
          linear-gradient(145deg, #100817 0%, #24122c 48%, #09182b 100%);
      }

      .gate::before {
        position: absolute;
        inset: -20%;
        z-index: -1;
        background:
          linear-gradient(115deg, transparent 28%, rgba(98, 232, 255, 0.12), transparent 48%),
          linear-gradient(245deg, transparent 34%, rgba(255, 90, 154, 0.15), transparent 58%);
        content: "";
        animation: shimmer 7s ease-in-out infinite alternate;
      }

      .stars {
        position: absolute;
        inset: 0;
        z-index: -1;
        overflow: hidden;
      }

      .stars span {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--s);
        height: var(--s);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.72);
        animation: twinkle var(--d) ease-in-out infinite;
        animation-delay: var(--delay);
      }

      .invite {
        display: grid;
        width: min(620px, 100%);
        justify-items: center;
        gap: 22px;
        text-align: center;
      }

      .mini-heart {
        width: clamp(108px, 28vw, 168px);
        height: auto;
        filter: drop-shadow(0 24px 44px rgba(255, 90, 154, 0.28));
        animation: float 4.2s ease-in-out infinite;
      }

      .mini-heart path {
        transform-origin: 100px 92px;
        animation: heartbeat 1.7s ease-in-out infinite;
      }

      h1 {
        max-width: 9em;
        margin: 0;
        font-size: clamp(2.55rem, 8vw, 5.8rem);
        font-weight: 850;
        line-height: 1.08;
        letter-spacing: 0;
        text-shadow: 0 14px 42px rgba(0, 0, 0, 0.34);
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 3vw, 1.22rem);
        line-height: 1.8;
      }

      .open-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        min-height: 54px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(255, 211, 106, 0.98), rgba(255, 90, 154, 0.98)),
          var(--rose);
        box-shadow:
          0 18px 48px rgba(255, 90, 154, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
        color: #29101b;
        font-size: 1.12rem;
        font-weight: 800;
        text-decoration: none;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .open-button:active {
        transform: translateY(2px) scale(0.98);
      }

      @media (hover: hover) {
        .open-button:hover {
          transform: translateY(-2px);
          box-shadow:
            0 24px 58px rgba(255, 90, 154, 0.44),
            inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
      }

      @keyframes shimmer {
        from {
          transform: translateX(-3%) rotate(0deg);
        }

        to {
          transform: translateX(3%) rotate(4deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        50% {
          transform: translateY(-12px) scale(1.04);
        }
      }

      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }

        20% {
          transform: scale(1.08);
        }

        42% {
          transform: scale(0.98);
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(0.62);
        }

        50% {
          opacity: 0.92;
          transform: scale(1.18);
        }
      }
    </style>
  </head>
  <body>
    <main class="gate">
      <div class="stars" aria-hidden="true"></div>
      <section class="invite" aria-label="爱心邀请">
        <svg class="mini-heart" viewBox="0 0 200 180" aria-hidden="true">
          <defs>
            <radialGradient id="miniGlow" cx="50%" cy="34%" r="68%">
              <stop offset="0%" stop-color="#fff8fb" />
              <stop offset="34%" stop-color="#ff8ab9" />
              <stop offset="76%" stop-color="#ff2f7b" />
              <stop offset="100%" stop-color="#9e1042" />
            </radialGradient>
          </defs>
          <path
            d="M100 162C54 124 18 91 18 48C18 20 38 6 62 6C80 6 93 16 100 31C107 16 120 6 138 6C162 6 182 20 182 48C182 91 146 124 100 162Z"
            fill="url(#miniGlow)"
          />
        </svg>
        <h1>江大美女，想看爱心么</h1>
        <p class="subtitle">有一片心海流光，想给你看。</p>
        <a class="open-button" href="./heart.html">想看</a>
      </section>
    </main>
    <script>
      const stars = document.querySelector(".stars");

      for (let index = 0; index < 48; index += 1) {
        const star = document.createElement("span");
        star.style.setProperty("--x", `${(index * 43) % 100}%`);
        star.style.setProperty("--y", `${(index * 67) % 100}%`);
        star.style.setProperty("--s", `${2 + (index % 4)}px`);
        star.style.setProperty("--d", `${3.4 + (index % 5) * 0.45}s`);
        star.style.setProperty("--delay", `${(index % 8) * 0.28}s`);
        stars.appendChild(star);
      }
    </script>
  </body>
</html>
