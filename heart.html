<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>心海流光</title>
    <meta name="description" content="一颗简洁、安静旋转的 3D 粒子爱心。" />
    <style>
      :root {
        --bg: #05070d;
        --text: #fff8fb;
        --soft: rgba(255, 248, 251, 0.74);
        --dim: rgba(255, 248, 251, 0.5);
        --pink: #ff6f9f;
        --pink-soft: #ffd2df;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 43%, rgba(255, 111, 159, 0.13), transparent 33%),
          radial-gradient(circle at 50% 92%, rgba(255, 210, 223, 0.06), transparent 34%),
          linear-gradient(180deg, #05070d 0%, #080b14 58%, #05070d 100%);
      }

      #heartCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .top-copy,
      .bottom-copy {
        position: absolute;
        right: max(20px, env(safe-area-inset-right));
        left: max(20px, env(safe-area-inset-left));
        z-index: 2;
        text-align: center;
        pointer-events: none;
      }

      .top-copy {
        top: max(28px, env(safe-area-inset-top));
      }

      .kicker {
        margin: 0 0 8px;
        color: var(--dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.35rem, 11vw, 4.4rem);
        font-weight: 850;
        line-height: 1;
        letter-spacing: 0;
      }

      .bottom-copy {
        bottom: max(30px, env(safe-area-inset-bottom));
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .note {
        width: min(100%, 18.5rem);
        margin: 0;
        color: var(--soft);
        font-size: clamp(0.95rem, 3.8vw, 1.08rem);
        line-height: 1.78;
      }

      .note strong {
        color: #ffffff;
        font-weight: 800;
      }

      .hint {
        margin: 2px 0 0;
        color: var(--dim);
        font-size: 0.78rem;
        letter-spacing: 0.05em;
      }

      .back-link {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        z-index: 3;
        color: rgba(255, 248, 251, 0.58);
        font-size: 0.9rem;
        line-height: 1;
        text-decoration: none;
        transition: color 160ms ease;
      }

      .back-link:active,
      .back-link:hover {
        color: rgba(255, 248, 251, 0.9);
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="心海流光 3D 粒子爱心">
      <canvas id="heartCanvas"></canvas>
      <a class="back-link" href="./index.html">返回</a>

      <section class="top-copy">
        <p class="kicker">quiet little galaxy</p>
        <h1>心海流光</h1>
      </section>

      <section class="bottom-copy">
        <p class="note">
          江大美女，给你看一颗<br />
          安静旋转的星星心。<br />
          愿今天有一点点温柔，<br />
          刚好被你撞见。
        </p>
        <p class="note"><strong>不用想太多，漂亮就够了。</strong></p>
        <p class="hint">它会自己慢慢转</p>
      </section>
    </main>

    <script>
      const canvas = document.querySelector("#heartCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let width = 0;
      let height = 0;
      let dpr = 1;
      let scale = 1;
      let centerX = 0;
      let centerY = 0;
      let lastTime = performance.now();

      const heartPoints = [];
      const projected = [];
      const dust = [];
      const colors = ["#fff8fb", "#ffd2df", "#ff8caf", "#f6becd"];
      const sprites = new Map();

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function heartField(x, y, z) {
        const a = x * x + 2.25 * y * y + z * z - 1;
        return a * a * a - x * x * z * z * z - 0.1125 * y * y * z * z * z;
      }

      function makeSprite(color) {
        const size = 42;
        const sprite = document.createElement("canvas");
        const sctx = sprite.getContext("2d");
        sprite.width = size;
        sprite.height = size;
        const gradient = sctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
        gradient.addColorStop(0, color);
        gradient.addColorStop(0.22, color);
        gradient.addColorStop(0.58, hexToRgba(color, 0.2));
        gradient.addColorStop(1, hexToRgba(color, 0));
        sctx.fillStyle = gradient;
        sctx.fillRect(0, 0, size, size);
        return sprite;
      }

      function getSprite(color) {
        if (!sprites.has(color)) {
          sprites.set(color, makeSprite(color));
        }

        return sprites.get(color);
      }

      function createHeartPoints() {
        heartPoints.length = 0;
        let attempts = 0;

        while (heartPoints.length < 1450 && attempts < 180000) {
          attempts += 1;
          const x = rand(-1.38, 1.38);
          const y = rand(-0.82, 0.82);
          const z = rand(-1.08, 1.42);
          const f = heartField(x, y, z);

          if (f > 0) {
            continue;
          }

          const d = 0.045;
          const nearSurface =
            heartField(x + d, y, z) > 0 ||
            heartField(x - d, y, z) > 0 ||
            heartField(x, y + d, z) > 0 ||
            heartField(x, y - d, z) > 0 ||
            heartField(x, y, z + d) > 0 ||
            heartField(x, y, z - d) > 0;

          if (!nearSurface && Math.random() > 0.12) {
            continue;
          }

          heartPoints.push({
            x: x * 1.04,
            y: y * 1.18,
            z: z * 1.04,
            size: rand(0.55, nearSurface ? 1.08 : 0.82),
            color: colors[heartPoints.length % colors.length],
            phase: rand(0, Math.PI * 2),
            surface: nearSurface
          });
        }
      }

      function createDust() {
        dust.length = 0;
        const count = Math.round(Math.min(70, Math.max(38, (width * height) / 12000)));

        for (let i = 0; i < count; i += 1) {
          dust.push({
            x: Math.random() * width,
            y: Math.random() * height,
            r: rand(0.45, 1.25),
            phase: rand(0, Math.PI * 2),
            alpha: rand(0.16, 0.42)
          });
        }
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        centerX = width / 2;
        centerY = height * (width < 760 ? 0.45 : 0.46);
        scale = Math.min(width, height) * (width < 760 ? 0.178 : 0.215);
        createDust();
      }

      function drawBackground(time) {
        ctx.clearRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, Math.min(width, height) * 0.42);
        glow.addColorStop(0, "rgba(255, 111, 159, 0.11)");
        glow.addColorStop(0.45, "rgba(255, 111, 159, 0.035)");
        glow.addColorStop(1, "rgba(255, 111, 159, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(centerX, centerY, Math.min(width, height) * 0.42, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const star of dust) {
          const alpha = star.alpha + Math.sin(time * 0.0012 + star.phase) * 0.1;
          ctx.fillStyle = `rgba(255, 248, 251, ${Math.max(0.08, alpha)})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawHeart(time) {
        const yaw = prefersReducedMotion ? 0.42 : Math.sin(time * 0.00042) * 0.72;
        const pitch = -0.18 + Math.sin(time * 0.00028) * 0.05;
        const roll = Math.sin(time * 0.00022) * 0.035;
        const cy = Math.cos(yaw);
        const sy = Math.sin(yaw);
        const cp = Math.cos(pitch);
        const sp = Math.sin(pitch);
        const cr = Math.cos(roll);
        const sr = Math.sin(roll);
        projected.length = 0;

        for (const point of heartPoints) {
          let x = point.x;
          let y = point.y;
          let z = point.z;

          const x1 = x * cy + y * sy;
          const y1 = -x * sy + y * cy;
          const z1 = z;
          const y2 = y1 * cp - z1 * sp;
          const z2 = y1 * sp + z1 * cp;
          const x3 = x1 * cr - z2 * sr;
          const z3 = x1 * sr + z2 * cr;
          const perspective = 2.35 / (2.35 - y2 * 0.48);
          const px = centerX + x3 * scale * perspective;
          const py = centerY - z3 * scale * perspective;
          const depth = Math.max(0, Math.min(1, (y2 + 1.15) / 2.3));
          const twinkle = 0.82 + Math.sin(time * 0.002 + point.phase) * 0.18;

          projected.push({
            x: px,
            y: py,
            depth,
            z: y2,
            color: point.color,
            size: point.size * perspective * (point.surface ? 1.15 : 0.88),
            alpha: (0.28 + depth * 0.7) * twinkle
          });
        }

        projected.sort((a, b) => a.z - b.z);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const point of projected) {
          const sprite = getSprite(point.color);
          const size = point.size * (4.6 + point.depth * 2.4);
          ctx.globalAlpha = Math.min(1, point.alpha);
          ctx.drawImage(sprite, point.x - size / 2, point.y - size / 2, size, size);
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      function hexToRgba(hex, alpha) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function animate(now) {
        lastTime = now;
        drawBackground(now);
        drawHeart(now);
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);

      createHeartPoints();
      resize();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
