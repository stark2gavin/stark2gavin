<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>心海流光</title>
    <meta name="description" content="一片会旋转的粒子爱心星海。" />
    <style>
      :root {
        --bg: #030714;
        --text: #fff8fb;
        --soft: rgba(255, 248, 251, 0.76);
        --dim: rgba(255, 248, 251, 0.56);
        --pink: #ff5f9f;
        --gold: #ffd36a;
        --blue: #6ee7ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
        touch-action: none;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 36%, rgba(255, 95, 159, 0.2), transparent 28%),
          radial-gradient(circle at 18% 20%, rgba(110, 231, 255, 0.2), transparent 30%),
          radial-gradient(circle at 82% 84%, rgba(255, 211, 106, 0.13), transparent 28%),
          linear-gradient(180deg, #030714 0%, #100a25 48%, #061525 100%);
      }

      .scene::before {
        position: absolute;
        inset: -15%;
        z-index: -1;
        background:
          conic-gradient(
            from 220deg at 50% 48%,
            transparent,
            rgba(110, 231, 255, 0.1),
            transparent,
            rgba(255, 95, 159, 0.13),
            transparent
          );
        content: "";
        animation: slowSpin 18s linear infinite;
        filter: blur(8px);
      }

      #heartCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .top-copy,
      .bottom-copy {
        position: absolute;
        right: max(20px, env(safe-area-inset-right));
        left: max(20px, env(safe-area-inset-left));
        z-index: 2;
        text-align: center;
        text-shadow: 0 12px 36px rgba(0, 0, 0, 0.46);
        pointer-events: none;
      }

      .top-copy {
        top: max(24px, env(safe-area-inset-top));
      }

      .kicker {
        margin: 0 0 9px;
        color: var(--blue);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.55rem, 13vw, 4.9rem);
        font-weight: 900;
        line-height: 0.96;
        letter-spacing: 0;
      }

      .bottom-copy {
        bottom: max(28px, env(safe-area-inset-bottom));
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .note {
        width: min(100%, 20rem);
        margin: 0;
        color: var(--soft);
        font-size: clamp(0.94rem, 3.8vw, 1.08rem);
        line-height: 1.76;
      }

      .note strong {
        color: #ffffff;
        font-weight: 850;
      }

      .hint {
        margin: 2px 0 0;
        color: var(--dim);
        font-size: 0.82rem;
        letter-spacing: 0.06em;
      }

      .back-link {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        left: max(16px, env(safe-area-inset-left));
        z-index: 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 248, 251, 0.86);
        font-size: 1.25rem;
        text-decoration: none;
        backdrop-filter: blur(12px);
      }

      @media (min-width: 760px) {
        .top-copy {
          top: 42px;
        }

        .bottom-copy {
          bottom: 46px;
        }

        .note {
          width: min(100%, 34rem);
        }
      }

      @keyframes slowSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="心海流光粒子爱心">
      <canvas id="heartCanvas"></canvas>
      <a class="back-link" href="./index.html" aria-label="返回">‹</a>

      <section class="top-copy">
        <p class="kicker">a tiny galaxy for you</p>
        <h1>心海流光</h1>
      </section>

      <section class="bottom-copy">
        <p class="note">
          江大美女，送你一片会旋转的星海。<br />
          愿今晚有一点光，刚好落进你眼里；也把一点点好心情，轻轻留给你。
        </p>
        <p class="note"><strong>不用急着回答什么，先看它亮一会儿。</strong></p>
        <p class="hint">左右滑动，星星会跟着转</p>
      </section>
    </main>

    <script>
      const canvas = document.querySelector("#heartCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let width = 0;
      let height = 0;
      let dpr = 1;
      let scale = 1;
      let centerX = 0;
      let centerY = 0;
      let dragAngle = 0;
      let lastX = 0;
      let isDragging = false;
      let lastTime = performance.now();

      const particles = [];
      const backgroundStars = [];
      const sparkleColors = ["#fff8fb", "#ff78ad", "#ffd36a", "#6ee7ff"];

      function heartPoint(t) {
        const x = 16 * Math.sin(t) ** 3;
        const y =
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t);
        return { x, y };
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function createHeartParticles() {
        particles.length = 0;

        for (let i = 0; i < 760; i += 1) {
          const t = rand(0, Math.PI * 2);
          const base = heartPoint(t);
          const fill = 0.18 + Math.sqrt(Math.random()) * 0.82;
          particles.push({
            x: base.x * fill + rand(-0.18, 0.18),
            y: base.y * fill + rand(-0.18, 0.18),
            z: rand(-7.5, 7.5) * (0.25 + fill * 0.75),
            size: rand(0.75, 1.95),
            color: sparkleColors[i % sparkleColors.length],
            phase: rand(0, Math.PI * 2),
            glow: rand(0.45, 1)
          });
        }

        for (let i = 0; i < 420; i += 1) {
          const t = (Math.PI * 2 * i) / 420;
          const base = heartPoint(t);
          particles.push({
            x: base.x + rand(-0.08, 0.08),
            y: base.y + rand(-0.08, 0.08),
            z: rand(-4, 4),
            size: rand(1.15, 2.35),
            color: i % 5 === 0 ? "#6ee7ff" : i % 5 === 1 ? "#ffd36a" : "#fff8fb",
            phase: rand(0, Math.PI * 2),
            glow: rand(0.7, 1.15)
          });
        }
      }

      function createBackgroundStars() {
        backgroundStars.length = 0;
        const count = Math.round(Math.min(160, Math.max(90, (width * height) / 7000)));

        for (let i = 0; i < count; i += 1) {
          backgroundStars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            z: Math.random(),
            size: rand(0.45, 1.9),
            drift: rand(0.015, 0.06),
            phase: rand(0, Math.PI * 2)
          });
        }
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        centerX = width / 2;
        centerY = height * (width < 760 ? 0.43 : 0.45);
        scale = Math.min(width, height) * (width < 760 ? 0.029 : 0.033);
        createBackgroundStars();
      }

      function drawBackground(time, delta) {
        const gradient = ctx.createRadialGradient(centerX, centerY, 20, centerX, centerY, Math.max(width, height) * 0.72);
        gradient.addColorStop(0, "rgba(255, 95, 159, 0.1)");
        gradient.addColorStop(0.42, "rgba(12, 22, 46, 0.35)");
        gradient.addColorStop(1, "rgba(3, 7, 20, 0.96)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const star of backgroundStars) {
          star.x += star.drift * delta * (0.018 + star.z * 0.026);
          if (star.x > width + 8) {
            star.x = -8;
            star.y = Math.random() * height;
          }

          const alpha = 0.18 + Math.sin(time * 0.0015 + star.phase) * 0.18 + star.z * 0.34;
          ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.05, alpha)})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size * (0.7 + star.z), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawHeart(time) {
        const autoAngle = prefersReducedMotion ? 0.2 : Math.sin(time * 0.00055) * 0.72;
        const angleY = autoAngle + dragAngle;
        const angleX = -0.1 + Math.sin(time * 0.00032) * 0.08;
        const cosY = Math.cos(angleY);
        const sinY = Math.sin(angleY);
        const cosX = Math.cos(angleX);
        const sinX = Math.sin(angleX);
        const projected = [];

        for (const p of particles) {
          const rx = p.x * cosY - p.z * sinY;
          const rz = p.x * sinY + p.z * cosY;
          const ry = p.y * cosX - rz * sinX;
          const rz2 = p.y * sinX + rz * cosX;
          const perspective = 58 / (58 + rz2);
          const px = centerX + rx * scale * perspective;
          const py = centerY - ry * scale * perspective;
          const twinkle = 0.68 + Math.sin(time * 0.003 + p.phase) * 0.32;

          projected.push({
            x: px,
            y: py,
            z: rz2,
            r: Math.max(0.5, p.size * perspective * (width < 760 ? 1.05 : 1.18)),
            color: p.color,
            alpha: Math.min(1, (0.36 + (rz2 + 11) / 28) * twinkle * p.glow)
          });
        }

        projected.sort((a, b) => a.z - b.z);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const p of projected) {
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 10 + p.r * 4;
          ctx.fillStyle = hexToRgba(p.color, p.alpha);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function hexToRgba(hex, alpha) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function animate(now) {
        const delta = Math.min(40, now - lastTime);
        lastTime = now;
        drawBackground(now, delta);
        drawHeart(now);

        if (!isDragging) {
          dragAngle *= 0.985;
        }

        requestAnimationFrame(animate);
      }

      function handlePointerDown(event) {
        isDragging = true;
        lastX = event.clientX;
      }

      function handlePointerMove(event) {
        if (!isDragging) {
          return;
        }

        const dx = event.clientX - lastX;
        dragAngle += dx * 0.008;
        lastX = event.clientX;
      }

      function handlePointerUp() {
        isDragging = false;
      }

      window.addEventListener("resize", resize);
      window.addEventListener("pointerdown", handlePointerDown);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerup", handlePointerUp);
      window.addEventListener("pointercancel", handlePointerUp);

      createHeartParticles();
      resize();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
