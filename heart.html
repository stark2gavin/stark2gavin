<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070609" />
    <title>今晚的星光，刚好偏向你</title>
    <meta name="description" content="一颗在夜色中缓慢盛开的流光爱心。" />
    <style>
      :root {
        color-scheme: dark;
        --paper: #fffaf7;
        --rose: #ffc0ca;
        --soft: rgba(255, 247, 244, 0.7);
        --dim: rgba(255, 247, 244, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: #070609;
        color: var(--paper);
        font-family:
          "PingFang SC",
          "Microsoft YaHei",
          "Noto Sans CJK SC",
          sans-serif;
      }

      body {
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      .scene {
        position: relative;
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(circle at 50% 34%, rgba(81, 45, 61, 0.14), transparent 34%),
          linear-gradient(180deg, #070609 0%, #10090d 58%, #070609 100%);
      }

      #heartCanvas {
        position: absolute;
        inset: 0;
        z-index: -2;
        width: 100%;
        height: 100%;
      }

      .scene::before {
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(180deg, rgba(7, 6, 9, 0.12) 0%, transparent 42%, rgba(7, 6, 9, 0.18) 72%, rgba(7, 6, 9, 0.72) 100%),
          radial-gradient(ellipse at 50% 42%, transparent 24%, rgba(7, 6, 9, 0.22) 68%, rgba(7, 6, 9, 0.64) 100%);
        content: "";
        pointer-events: none;
      }

      .caption {
        position: absolute;
        right: max(24px, env(safe-area-inset-right));
        bottom: max(19px, env(safe-area-inset-bottom));
        left: max(24px, env(safe-area-inset-left));
        display: grid;
        justify-items: center;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        text-shadow: 0 3px 18px rgba(0, 0, 0, 0.9);
        animation: reveal-copy 1.4s 4.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .caption .to {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin: 0 0 0.42rem;
        color: var(--rose);
        font-size: clamp(0.72rem, 1.7vw, 0.84rem);
        font-weight: 600;
      }

      .caption .to::before,
      .caption .to::after {
        width: 1.2rem;
        height: 1px;
        background: rgba(255, 192, 202, 0.44);
        content: "";
      }

      .caption .message {
        margin: 0;
        color: rgba(255, 250, 247, 0.8);
        font-size: clamp(0.9rem, 2.05vw, 1.06rem);
        line-height: 1.75;
      }

      .caption .message strong {
        color: #fff;
        font-weight: 650;
      }

      .caption .wish {
        margin: 0.18rem 0 0;
        color: var(--dim);
        font-size: clamp(0.72rem, 1.55vw, 0.84rem);
        line-height: 1.7;
      }

      @media (orientation: portrait) {
        .caption {
          bottom: max(7.5vh, env(safe-area-inset-bottom));
        }

        .caption .to {
          margin-bottom: 0.65rem;
        }

        .caption .message {
          font-size: clamp(1rem, 4.2vw, 1.16rem);
          line-height: 1.85;
        }

        .caption .wish {
          max-width: 20rem;
          margin-top: 0.48rem;
          font-size: clamp(0.78rem, 3.2vw, 0.92rem);
        }
      }

      @media (max-height: 390px) and (orientation: landscape) {
        .caption {
          bottom: max(10px, env(safe-area-inset-bottom));
        }

        .caption .to {
          margin-bottom: 0.2rem;
          font-size: 0.72rem;
        }

        .caption .message {
          font-size: 0.88rem;
          line-height: 1.55;
        }

        .caption .wish {
          margin-top: 0.06rem;
          font-size: 0.72rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .caption {
          opacity: 1;
          animation: none;
        }
      }

      @keyframes reveal-copy {
        from {
          opacity: 0;
          transform: translateY(12px);
          filter: blur(4px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="流光爱心动画">
      <canvas id="heartCanvas" aria-hidden="true"></canvas>
      <section class="caption">
        <p class="to">江大美女</p>
        <p class="message">和你聊天的那些普通时刻，<strong>我都觉得很特别。</strong></p>
        <p class="wish">如果你愿意，我想陪你把故事慢慢写下去。</p>
      </section>
    </main>

    <script>
      const canvas = document.querySelector("#heartCanvas");
      const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const TAU = Math.PI * 2;

      let width = 0;
      let height = 0;
      let dpr = 1;
      let startTime = performance.now();
      let layout = {};
      let stars = [];
      let heartParticles = [];
      let ribbons = [];
      let filaments = [];
      let bloomParticles = [];
      let groundParticles = [];
      let groundWaves = [];
      let activeParticleColor = -1;

      const palette = [
        [255, 246, 242],
        [255, 190, 202],
        [255, 218, 179],
        [211, 207, 255]
      ];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function smoothstep(min, max, value) {
        const x = clamp((value - min) / (max - min), 0, 1);
        return x * x * (3 - 2 * x);
      }

      function easeOut(value) {
        return 1 - Math.pow(1 - clamp(value, 0, 1), 3);
      }

      function heartLocal(t) {
        return {
          x: 16 * Math.pow(Math.sin(t), 3),
          y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
        };
      }

      function curvePoint(curve, t) {
        const inv = 1 - t;
        const inv2 = inv * inv;
        const t2 = t * t;

        return {
          x: inv2 * inv * curve.sx + 3 * inv2 * t * curve.c1x + 3 * inv * t2 * curve.c2x + t2 * t * curve.ex,
          y: inv2 * inv * curve.sy + 3 * inv2 * t * curve.c1y + 3 * inv * t2 * curve.c2y + t2 * t * curve.ey
        };
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        createScene();
      }

      function createScene() {
        const landscape = width / height > 1.12;
        const scaleY = landscape
          ? Math.min(height / 50.5, width / 82)
          : Math.min(width / 38.5, height / 64);
        const scaleX = scaleY * (landscape ? 1.36 : 1.02);
        const lowPower =
          (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
          (navigator.deviceMemory && navigator.deviceMemory <= 4);
        const density = lowPower ? 0.72 : 1;

        layout = {
          landscape,
          cx: width * 0.5,
          cy: height * (landscape ? 0.34 : 0.285),
          groundY: height * (landscape ? 0.735 : 0.62),
          scaleX,
          scaleY,
          lowPower
        };

        createStars();
        createHeartParticles(Math.round((landscape ? 6400 : 5200) * density));
        createRibbons(landscape ? 24 : 20);
        createFilaments(Math.round((landscape ? 190 : 138) * density));
        createBloomParticles(Math.round((landscape ? 5200 : 3900) * density));
        createGroundParticles(Math.round((landscape ? 3600 : 2600) * density));
        createGroundWaves(landscape ? 26 : 18);

        window.__heartScene = {
          heartParticles: heartParticles.length,
          bloomParticles: bloomParticles.length,
          groundParticles: groundParticles.length,
          filaments: filaments.length,
          lowPower
        };
      }

      function createStars() {
        const count = layout.landscape ? 180 : 130;
        stars = Array.from({ length: count }, (_, index) => ({
          x: Math.random() * width,
          y: Math.random() * height * 0.72,
          radius: Math.random() > 0.92 ? rand(0.65, 1.35) : rand(0.18, 0.62),
          alpha: rand(0.08, 0.44),
          phase: rand(0, TAU),
          speed: rand(0.00035, 0.001),
          warm: index % 11 === 0
        }));
      }

      function createHeartParticles(count) {
        heartParticles = [];

        for (let index = 0; index < count; index += 1) {
          const t = rand(0, TAU);
          const surface = Math.random() < 0.48;
          const radial = surface ? rand(0.88, 1.035) : Math.pow(Math.random(), 0.72) * 0.92;
          const point = heartLocal(t);
          const thickness = surface
            ? rand(-1.15, 1.15)
            : rand(-1, 1) * Math.sqrt(Math.max(0, 1 - radial * radial)) * rand(4.6, 8.6);
          const brightness = surface ? rand(0.34, 0.94) : rand(0.16, 0.66);
          const colorRoll = Math.random();
          const colorIndex = colorRoll < 0.58 ? 1 : colorRoll < 0.8 ? 0 : colorRoll < 0.93 ? 2 : 3;

          heartParticles.push({
            x: point.x * radial,
            y: point.y * radial,
            z: thickness,
            seedX: layout.cx + rand(-18, 18),
            seedY: layout.groundY + rand(-4, 7),
            radius: surface ? rand(0.38, 1.22) : rand(0.22, 0.82),
            alpha: brightness,
            phase: rand(0, TAU),
            delay: rand(0, 1),
            colorIndex,
            spark: Math.random() < 0.018
          });
        }

        heartParticles.sort((a, b) => a.colorIndex - b.colorIndex);
      }

      function createRibbons(count) {
        ribbons = Array.from({ length: count }, (_, index) => ({
          scale: 0.67 + (index / Math.max(1, count - 1)) * 0.39,
          alpha: rand(0.025, 0.105) * (index > count * 0.72 ? 1.5 : 1),
          width: rand(0.28, 0.78),
          phase: rand(0, TAU),
          color: index % 7 === 0 ? "255, 218, 179" : index % 5 === 0 ? "211, 207, 255" : "255, 190, 202"
        }));
      }

      function createFilaments(count) {
        filaments = [];

        for (let index = 0; index < count; index += 1) {
          const side = index % 2 === 0 ? -1 : 1;
          const groundBound = Math.random() < 0.72;
          const reach = rand(0.2, groundBound ? 0.57 : 0.48) * width;
          const endY = groundBound
            ? layout.groundY + rand(-0.025, 0.085) * height
            : layout.cy + rand(-0.13, 0.34) * height;
          const startX = layout.cx + side * rand(0, width * 0.035);
          const lift = groundBound ? rand(0.18, 0.54) * height : rand(0.12, 0.38) * height;

          filaments.push({
            sx: startX,
            sy: layout.groundY + rand(-4, 6),
            c1x: layout.cx + side * rand(0.045, 0.19) * width,
            c1y: layout.groundY - lift,
            c2x: layout.cx + side * reach * rand(0.58, 0.9),
            c2y: endY - rand(0.02, 0.22) * height,
            ex: layout.cx + side * reach,
            ey: endY,
            alpha: rand(0.018, groundBound ? 0.075 : 0.055),
            width: rand(0.25, 0.92),
            delay: rand(0, 1.25),
            phase: rand(0, 1),
            speed: rand(0.7, 1.45),
            color: Math.random() < 0.12 ? "211, 207, 255" : Math.random() < 0.22 ? "255, 218, 179" : "255, 190, 202"
          });
        }

      }

      function createBloomParticles(count) {
        bloomParticles = [];

        for (let index = 0; index < count; index += 1) {
          const filamentIndex = Math.floor(Math.random() * filaments.length);
          const pathT = Math.pow(rand(0.08, 1), 0.72);
          const colorRoll = Math.random();

          bloomParticles.push({
            filamentIndex,
            pathT,
            offsetX: rand(-1, 1) * rand(0.4, 5.8),
            offsetY: rand(-1, 1) * rand(0.25, 4.2),
            radius: Math.random() < 0.08 ? rand(0.8, 1.45) : rand(0.18, 0.66),
            alpha: rand(0.08, Math.random() < 0.12 ? 0.58 : 0.34),
            phase: rand(0, TAU),
            delay: rand(0, 0.9),
            colorIndex: colorRoll < 0.5 ? 1 : colorRoll < 0.75 ? 0 : colorRoll < 0.9 ? 2 : 3
          });
        }

        bloomParticles.sort((a, b) => a.colorIndex - b.colorIndex);
      }

      function createGroundParticles(count) {
        groundParticles = [];

        for (let index = 0; index < count; index += 1) {
          const side = Math.random() < 0.5 ? -1 : 1;
          const distance = Math.pow(Math.random(), 0.72) * width * 0.55;
          const x = layout.cx + side * distance + rand(-10, 10);
          const centerFade = 1 - clamp(Math.abs(x - layout.cx) / (width * 0.62), 0, 1);

          groundParticles.push({
            x,
            y: layout.groundY + rand(-height * 0.035, height * 0.09),
            seedX: layout.cx + rand(-16, 16),
            seedY: layout.groundY + rand(-3, 6),
            radius: Math.random() < 0.07 ? rand(0.75, 1.35) : rand(0.16, 0.58),
            alpha: rand(0.06, 0.34) * (0.4 + centerFade * 0.6),
            phase: rand(0, TAU),
            delay: rand(0, 1),
            colorIndex: Math.random() < 0.68 ? 1 : Math.random() < 0.7 ? 0 : 2
          });
        }

        groundParticles.sort((a, b) => a.colorIndex - b.colorIndex);
      }

      function createGroundWaves(count) {
        groundWaves = Array.from({ length: count }, (_, index) => ({
          y: layout.groundY + rand(-height * 0.025, height * 0.055),
          amp: rand(height * 0.006, height * 0.023),
          frequency: rand(0.006, 0.017),
          phase: rand(0, TAU),
          speed: rand(0.00018, 0.00052),
          alpha: rand(0.018, 0.07),
          width: rand(0.24, 0.72),
          color: index % 8 === 0 ? "211, 207, 255" : "255, 190, 202"
        }));
      }

      function drawBackground(time) {
        const background = ctx.createLinearGradient(0, 0, 0, height);
        background.addColorStop(0, "#070609");
        background.addColorStop(0.58, "#11090d");
        background.addColorStop(1, "#070609");
        ctx.fillStyle = background;
        ctx.fillRect(0, 0, width, height);

        const haze = ctx.createRadialGradient(
          layout.cx,
          layout.cy + layout.scaleY * 2,
          0,
          layout.cx,
          layout.cy,
          Math.min(width, height) * 0.63
        );
        haze.addColorStop(0, "rgba(126, 58, 78, 0.105)");
        haze.addColorStop(0.42, "rgba(84, 48, 76, 0.042)");
        haze.addColorStop(1, "rgba(7, 6, 9, 0)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, width, height);

        for (const star of stars) {
          const twinkle = reducedMotion ? 0.78 : 0.58 + Math.sin(time * star.speed + star.phase) * 0.42;
          ctx.globalAlpha = star.alpha * twinkle;
          ctx.fillStyle = star.warm ? "#ffd9c5" : "#eeeaff";
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, TAU);
          ctx.fill();
        }

        ctx.globalAlpha = 1;
      }

      function drawGroundWaves(time, elapsed) {
        const reveal = smoothstep(1.3, 4.8, elapsed);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const wave of groundWaves) {
          ctx.beginPath();

          for (let x = -20; x <= width + 20; x += 9) {
            const centerLift = Math.exp(-Math.pow((x - layout.cx) / (width * 0.28), 2));
            const y =
              wave.y +
              Math.sin(x * wave.frequency + wave.phase + time * wave.speed) * wave.amp * (0.42 + centerLift * 0.58);

            if (x === -20) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }

          ctx.strokeStyle = `rgba(${wave.color}, ${wave.alpha * reveal})`;
          ctx.lineWidth = wave.width;
          ctx.stroke();
        }

        ctx.restore();
      }

      function strokeCurve(curve, progress, alpha, lineWidth, color) {
        const steps = Math.max(2, Math.ceil(28 * progress));
        ctx.beginPath();

        for (let index = 0; index <= steps; index += 1) {
          const t = progress * (index / steps);
          const point = curvePoint(curve, t);

          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        }

        ctx.strokeStyle = `rgba(${color}, ${alpha})`;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = "round";
        ctx.stroke();
      }

      function drawFilaments(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const filament of filaments) {
          const reveal = smoothstep(0.8 + filament.delay * 0.5, 4.15 + filament.delay * 0.65, elapsed);
          if (reveal <= 0) {
            continue;
          }

          strokeCurve(filament, reveal, filament.alpha * reveal, filament.width, filament.color);

          const headT = Math.min(reveal, (filament.phase + time * 0.000038 * filament.speed) % 1);
          if (headT > 0.035) {
            const head = curvePoint(filament, headT);
            const glow = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 4.2);
            glow.addColorStop(0, "rgba(255, 250, 247, 0.72)");
            glow.addColorStop(0.35, `rgba(${filament.color}, 0.22)`);
            glow.addColorStop(1, `rgba(${filament.color}, 0)`);
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(head.x, head.y, 4.2, 0, TAU);
            ctx.fill();
          }
        }

        ctx.restore();
      }

      function drawParticle(x, y, radius, alpha, colorIndex) {
        if (activeParticleColor !== colorIndex) {
          const color = palette[colorIndex];
          ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
          activeParticleColor = colorIndex;
        }

        ctx.globalAlpha = alpha;

        if (radius < 0.78) {
          ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
        } else {
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, TAU);
          ctx.fill();
        }
      }

      function drawBloomParticles(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        activeParticleColor = -1;

        for (const particle of bloomParticles) {
          const filament = filaments[particle.filamentIndex];
          const reveal = easeOut(
            smoothstep(1.05 + particle.delay * 0.65, 4.75 + particle.delay * 0.6, elapsed)
          );
          if (reveal <= 0) {
            continue;
          }

          const point = curvePoint(filament, particle.pathT * reveal);
          const settle = smoothstep(3.1, 5.2, elapsed);
          const drift = Math.sin(time * 0.0011 + particle.phase);
          const x = point.x + particle.offsetX * reveal + drift * settle * 0.75;
          const y = point.y + particle.offsetY * reveal + Math.cos(time * 0.0009 + particle.phase) * settle * 0.45;
          const twinkle = 0.68 + Math.sin(time * 0.0027 + particle.phase) * 0.32;

          drawParticle(x, y, particle.radius, particle.alpha * reveal * Math.max(0.18, twinkle), particle.colorIndex);
        }

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      function drawGroundParticles(time, elapsed) {
        const spread = easeOut(smoothstep(1.15, 4.7, elapsed));
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        activeParticleColor = -1;

        for (const particle of groundParticles) {
          const reveal = easeOut(clamp(spread - particle.delay * 0.2, 0, 1));
          if (reveal <= 0) {
            continue;
          }

          const arch = Math.sin(reveal * Math.PI) * randlessArch(particle.phase) * height * 0.055;
          const x = particle.seedX + (particle.x - particle.seedX) * reveal;
          const y = particle.seedY + (particle.y - particle.seedY) * reveal - arch;
          const twinkle = 0.64 + Math.sin(time * 0.0023 + particle.phase) * 0.36;
          drawParticle(x, y, particle.radius, particle.alpha * reveal * Math.max(0.16, twinkle), particle.colorIndex);
        }

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      function randlessArch(phase) {
        return 0.35 + ((Math.sin(phase * 2.17) + 1) * 0.5) * 0.65;
      }

      function projectHeartPoint(localX, localY, localZ, rotation, breathe) {
        const cosine = Math.cos(rotation);
        const sine = Math.sin(rotation);
        const rotatedX = localX * cosine + localZ * sine;
        const rotatedZ = -localX * sine + localZ * cosine;

        return {
          x: layout.cx + rotatedX * layout.scaleX * breathe,
          y: layout.cy + localY * layout.scaleY * breathe,
          depth: clamp((rotatedZ + 18) / 36, 0, 1)
        };
      }

      function drawHeartRibbons(time, elapsed, rotation, breathe) {
        const progress = reducedMotion ? 1 : smoothstep(0.55, 3.45, elapsed);
        if (progress <= 0) {
          return;
        }

        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const ribbon of ribbons) {
          const scale = ribbon.scale + Math.sin(time * 0.00055 + ribbon.phase) * 0.004;
          const offset = Math.sin(time * 0.00042 + ribbon.phase) * 0.72;
          drawHeartBranch(-1, progress, scale, offset, ribbon, rotation, breathe);
          drawHeartBranch(1, progress, scale, offset, ribbon, rotation, breathe);
        }

        const mainRibbon = {
          alpha: 0.44,
          width: 1.05,
          color: "255, 220, 224"
        };
        ctx.shadowBlur = 13;
        ctx.shadowColor = "rgba(255, 158, 177, 0.55)";
        drawHeartBranch(-1, progress, 1.005, 0, mainRibbon, rotation, breathe);
        drawHeartBranch(1, progress, 1.005, 0, mainRibbon, rotation, breathe);
        ctx.restore();
      }

      function drawHeartBranch(direction, progress, scale, offset, ribbon, rotation, breathe) {
        const steps = Math.max(2, Math.ceil(92 * progress));
        ctx.beginPath();

        for (let index = 0; index <= steps; index += 1) {
          const amount = progress * (index / steps);
          const t = Math.PI + direction * Math.PI * amount;
          const local = heartLocal(t);
          const point = projectHeartPoint(local.x * scale, local.y * scale, offset, rotation, breathe);

          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        }

        ctx.strokeStyle = `rgba(${ribbon.color}, ${ribbon.alpha * progress})`;
        ctx.lineWidth = ribbon.width;
        ctx.lineCap = "round";
        ctx.stroke();
      }

      function drawHeartParticles(time, elapsed, rotation, breathe) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        activeParticleColor = -1;

        for (const particle of heartParticles) {
          const reveal = easeOut(
            smoothstep(0.85 + particle.delay * 0.7, 3.85 + particle.delay * 0.8, elapsed)
          );
          if (reveal <= 0) {
            continue;
          }

          const point = projectHeartPoint(particle.x, particle.y, particle.z, rotation, breathe);
          const lift = Math.sin(reveal * Math.PI) * (18 + Math.abs(particle.x) * 0.9);
          const drift = Math.sin(time * 0.00125 + particle.phase) * (0.32 + point.depth * 0.42);
          const x = particle.seedX + (point.x - particle.seedX) * reveal + drift;
          const y = particle.seedY + (point.y - particle.seedY) * reveal - lift * (1 - reveal * 0.38);
          const twinkle = 0.7 + Math.sin(time * 0.0029 + particle.phase) * 0.3;
          const depthAlpha = 0.42 + point.depth * 0.78;
          const radius = particle.radius * (0.72 + point.depth * 0.64);
          const alpha = particle.alpha * reveal * depthAlpha * Math.max(0.2, twinkle);

          drawParticle(x, y, radius, alpha, particle.colorIndex);

          if (particle.spark && reveal > 0.92 && radius > 0.72) {
            ctx.globalAlpha = alpha * 0.34;
            ctx.fillStyle = "#fffaf7";
            ctx.fillRect(x - radius * 3.4, y - 0.3, radius * 6.8, 0.6);
            ctx.fillRect(x - 0.3, y - radius * 3.4, 0.6, radius * 6.8);
            activeParticleColor = -1;
          }
        }

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      function drawSource(time, elapsed) {
        const reveal = smoothstep(0.05, 1.15, elapsed);
        const settle = smoothstep(4.2, 7.4, elapsed);
        const pulse = 0.88 + Math.sin(time * 0.0024) * 0.12;
        const radius = Math.min(width, height) * (0.1 + reveal * 0.055);
        const alpha = (0.46 - settle * 0.27) * reveal * pulse;

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        const glow = ctx.createRadialGradient(layout.cx, layout.groundY, 0, layout.cx, layout.groundY, radius);
        glow.addColorStop(0, `rgba(255, 250, 247, ${alpha})`);
        glow.addColorStop(0.12, `rgba(255, 184, 198, ${alpha * 0.56})`);
        glow.addColorStop(0.42, `rgba(172, 100, 125, ${alpha * 0.18})`);
        glow.addColorStop(1, "rgba(95, 50, 68, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(layout.cx, layout.groundY, radius, 0, TAU);
        ctx.fill();

        const horizon = ctx.createLinearGradient(0, layout.groundY, width, layout.groundY);
        horizon.addColorStop(0, "rgba(255, 190, 202, 0)");
        horizon.addColorStop(0.28, `rgba(255, 190, 202, ${0.08 * reveal})`);
        horizon.addColorStop(0.5, `rgba(255, 244, 240, ${0.28 * reveal * (1 - settle * 0.35)})`);
        horizon.addColorStop(0.72, `rgba(255, 190, 202, ${0.08 * reveal})`);
        horizon.addColorStop(1, "rgba(255, 190, 202, 0)");
        ctx.strokeStyle = horizon;
        ctx.lineWidth = 0.85;
        ctx.beginPath();
        ctx.moveTo(0, layout.groundY);
        ctx.lineTo(width, layout.groundY);
        ctx.stroke();
        ctx.restore();
      }

      function animate(now) {
        const elapsed = reducedMotion ? 10 : (now - startTime) / 1000;
        const rotation = reducedMotion ? 0.035 : Math.sin(now * 0.00018) * 0.065;
        const breathe = 1 + Math.sin(now * 0.00105) * 0.012 * smoothstep(3.2, 5.2, elapsed);

        drawBackground(now);
        drawGroundWaves(now, elapsed);
        drawFilaments(now, elapsed);
        drawBloomParticles(now, elapsed);
        drawGroundParticles(now, elapsed);
        drawHeartRibbons(now, elapsed, rotation, breathe);
        drawHeartParticles(now, elapsed, rotation, breathe);
        drawSource(now, elapsed);

        requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener("resize", resize, { passive: true });
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
