<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>心海流光</title>
    <meta name="description" content="一颗安静旋转的 3D 粒子爱心。" />
    <style>
      :root {
        --bg: #02060d;
        --text: #fff8fb;
        --soft: rgba(255, 248, 251, 0.74);
        --dim: rgba(255, 248, 251, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 48%, rgba(118, 183, 255, 0.13), transparent 36%),
          radial-gradient(circle at 50% 62%, rgba(255, 245, 252, 0.075), transparent 24%),
          radial-gradient(circle at 50% 94%, rgba(115, 220, 255, 0.055), transparent 30%),
          linear-gradient(180deg, #02060d 0%, #060914 54%, #02050b 100%);
      }

      #trailCanvas,
      #heartCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #trailCanvas {
        z-index: 1;
        opacity: 0.96;
      }

      #heartCanvas {
        z-index: 2;
      }

      .stars {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .stars span {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--s);
        height: var(--s);
        border-radius: 999px;
        background: rgba(255, 248, 251, 0.58);
        opacity: 0.32;
        animation: starPulse var(--d) ease-in-out infinite;
        animation-delay: var(--delay);
      }

      .top-copy,
      .bottom-copy {
        position: absolute;
        right: max(20px, env(safe-area-inset-right));
        left: max(20px, env(safe-area-inset-left));
        z-index: 3;
        text-align: center;
        pointer-events: none;
      }

      .top-copy {
        top: max(30px, env(safe-area-inset-top));
      }

      .kicker {
        margin: 0 0 8px;
        color: var(--dim);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 10vw, 4.4rem);
        font-weight: 850;
        line-height: 1;
        letter-spacing: 0;
      }

      .bottom-copy {
        bottom: max(30px, env(safe-area-inset-bottom));
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .note {
        width: min(100%, 18.5rem);
        margin: 0;
        color: var(--soft);
        font-size: clamp(0.95rem, 3.8vw, 1.08rem);
        line-height: 1.78;
      }

      .note strong {
        color: #ffffff;
        font-weight: 800;
      }

      .hint {
        margin: 2px 0 0;
        color: var(--dim);
        font-size: 0.78rem;
        letter-spacing: 0.05em;
      }

      .back-link {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        z-index: 3;
        color: rgba(255, 248, 251, 0.58);
        font-size: 0.9rem;
        line-height: 1;
        text-decoration: none;
        transition: color 160ms ease;
      }

      .back-link:active,
      .back-link:hover {
        color: rgba(255, 248, 251, 0.9);
      }

      @keyframes starPulse {
        0%,
        100% {
          opacity: 0.14;
          transform: scale(0.7);
        }

        50% {
          opacity: 0.56;
          transform: scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="心海流光 3D 粒子爱心">
      <canvas id="trailCanvas"></canvas>
      <canvas id="heartCanvas"></canvas>
      <div class="stars" aria-hidden="true"></div>
      <a class="back-link" href="./index.html">返回</a>

      <section class="top-copy">
        <p class="kicker">quiet little galaxy</p>
        <h1>心海流光</h1>
      </section>

      <section class="bottom-copy">
        <p class="note">
          江大美女，给你看一颗<br />
          安静旋转的星星心。<br />
          愿今天有一点点温柔，<br />
          刚好被你撞见。
        </p>
        <p class="note"><strong>不用想太多，漂亮就够了。</strong></p>
        <p class="hint">它会自己慢慢转</p>
      </section>
    </main>

    <script>
      const trailCanvas = document.querySelector("#trailCanvas");
      const trailCtx = trailCanvas.getContext("2d", { alpha: true });
      const canvas = document.querySelector("#heartCanvas");
      const starLayer = document.querySelector(".stars");
      const gl = canvas.getContext("webgl", {
        alpha: true,
        antialias: true,
        depth: false,
        premultipliedAlpha: false
      });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const vertexSource = `
        precision mediump float;

        attribute vec3 aTarget;
        attribute vec3 aStart;
        attribute vec3 aColor;
        attribute float aSize;
        attribute float aPhase;

        uniform vec2 uResolution;
        uniform float uTime;
        uniform float uScale;
        uniform float uCenterY;
        uniform float uDpr;

        varying vec3 vColor;
        varying float vAlpha;

        float easeOutCubic(float x) {
          return 1.0 - pow(1.0 - x, 3.0);
        }

        void main() {
          float reveal = easeOutCubic(clamp((uTime - 0.12) / 2.35, 0.0, 1.0));
          float swirl = (1.0 - reveal) * (1.45 + aPhase * 0.035);
          float cs = cos(swirl);
          float sn = sin(swirl);
          vec3 start = aStart;
          start.xy = mat2(cs, -sn, sn, cs) * start.xy;

          vec3 target = aTarget * (1.0 + sin(uTime * 1.3 + aPhase) * 0.014);
          vec3 p = mix(start, target, reveal);

          float yaw = sin(uTime * 0.28) * 0.34;
          float pitch = -0.14 + sin(uTime * 0.22) * 0.05;
          float roll = sin(uTime * 0.17) * 0.04;

          float cy = cos(yaw);
          float sy = sin(yaw);
          vec3 p1 = vec3(p.x * cy - p.y * sy, p.x * sy + p.y * cy, p.z);

          float cp = cos(pitch);
          float sp = sin(pitch);
          vec3 p2 = vec3(p1.x, p1.y * cp - p1.z * sp, p1.y * sp + p1.z * cp);

          float cr = cos(roll);
          float sr = sin(roll);
          vec3 rp = vec3(p2.x * cr + p2.z * sr, p2.y, -p2.x * sr + p2.z * cr);

          float perspective = 2.85 / (2.85 - rp.y * 0.56);
          vec2 center = vec2(uResolution.x * 0.5, uCenterY);
          vec2 screen = center + vec2(rp.x, -rp.z) * uScale * perspective;
          vec2 clip = screen / uResolution * 2.0 - 1.0;

          float depth = clamp((rp.y + 1.45) / 2.9, 0.0, 1.0);
          float twinkle = 0.8 + sin(uTime * 2.4 + aPhase) * 0.2;

          gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
          gl_PointSize = aSize * (5.4 + depth * 5.1) * perspective * uDpr;

          vColor = aColor;
          vAlpha = (0.2 + depth * 0.8) * twinkle * reveal;
        }
      `;

      const fragmentSource = `
        precision mediump float;

        varying vec3 vColor;
        varying float vAlpha;

        void main() {
          float d = distance(gl_PointCoord, vec2(0.5));
          float soft = smoothstep(0.5, 0.0, d);
          float alpha = pow(soft, 1.65) * vAlpha;
          gl_FragColor = vec4(vColor, alpha);
        }
      `;

      let program;
      let pointCount = 0;
      let dpr = 1;
      let width = 0;
      let height = 0;
      let startTime = performance.now();
      let lightStreams = [];
      let waveLines = [];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function heartField(x, y, z) {
        const a = x * x + 2.25 * y * y + z * z - 1;
        return a * a * a - x * x * z * z * z - 0.1125 * y * y * z * z * z;
      }

      function compileShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(shader) || "Shader compile failed");
        }

        return shader;
      }

      function createProgram() {
        const vertex = compileShader(gl.VERTEX_SHADER, vertexSource);
        const fragment = compileShader(gl.FRAGMENT_SHADER, fragmentSource);
        const nextProgram = gl.createProgram();
        gl.attachShader(nextProgram, vertex);
        gl.attachShader(nextProgram, fragment);
        gl.linkProgram(nextProgram);

        if (!gl.getProgramParameter(nextProgram, gl.LINK_STATUS)) {
          throw new Error(gl.getProgramInfoLog(nextProgram) || "Program link failed");
        }

        return nextProgram;
      }

      function createHeartPoints() {
        const points = [];
        let attempts = 0;

        while (points.length < 5200 && attempts < 520000) {
          attempts += 1;
          const x = rand(-1.42, 1.42);
          const y = rand(-0.86, 0.86);
          const z = rand(-1.08, 1.44);
          const field = heartField(x, y, z);

          if (field > 0) {
            continue;
          }

          const delta = 0.042;
          const surface =
            heartField(x + delta, y, z) > 0 ||
            heartField(x - delta, y, z) > 0 ||
            heartField(x, y + delta, z) > 0 ||
            heartField(x, y - delta, z) > 0 ||
            heartField(x, y, z + delta) > 0 ||
            heartField(x, y, z - delta) > 0;

          if (!surface && Math.random() > 0.04) {
            continue;
          }

          points.push({
            x: x * 1.04,
            y: y * 1.08,
            z: z * 1.08,
            surface
          });
        }

        return points;
      }

      function createStartPoint() {
        const theta = rand(0, Math.PI * 2);
        const phi = Math.acos(rand(-1, 1));
        const radius = rand(2.4, 4.3);

        return [
          Math.sin(phi) * Math.cos(theta) * radius,
          Math.sin(phi) * Math.sin(theta) * radius,
          Math.cos(phi) * radius
        ];
      }

      function colorForPoint(point, index) {
        const glow = point.surface ? 0.86 : 0.68;
        const blue = 0.78 + Math.random() * 0.18;
        const white = index % 6 === 0;

        if (white) {
          return [0.96, 0.99, 1];
        }

        return [
          0.58 + glow * 0.28,
          0.75 + blue * 0.2,
          1
        ];
      }

      function uploadAttribute(name, values, size) {
        const location = gl.getAttribLocation(program, name);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(values), gl.STATIC_DRAW);
        gl.enableVertexAttribArray(location);
        gl.vertexAttribPointer(location, size, gl.FLOAT, false, 0, 0);
      }

      function initWebGL() {
        if (!gl) {
          document.body.classList.add("no-webgl");
          return;
        }

        program = createProgram();
        gl.useProgram(program);
        const points = createHeartPoints();
        pointCount = points.length;

        const targets = [];
        const starts = [];
        const colors = [];
        const sizes = [];
        const phases = [];

        points.forEach((point, index) => {
          const start = createStartPoint();
          const color = colorForPoint(point, index);
          targets.push(point.x, point.y, point.z);
          starts.push(start[0], start[1], start[2]);
          colors.push(color[0], color[1], color[2]);
          sizes.push(rand(point.surface ? 0.76 : 0.44, point.surface ? 1.42 : 0.86));
          phases.push(rand(0, Math.PI * 2));
        });

        uploadAttribute("aTarget", targets, 3);
        uploadAttribute("aStart", starts, 3);
        uploadAttribute("aColor", colors, 3);
        uploadAttribute("aSize", sizes, 1);
        uploadAttribute("aPhase", phases, 1);

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
        gl.disable(gl.DEPTH_TEST);
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        trailCanvas.width = Math.floor(width * dpr);
        trailCanvas.height = Math.floor(height * dpr);
        trailCanvas.style.width = `${width}px`;
        trailCanvas.style.height = `${height}px`;
        trailCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;

        if (gl) {
          gl.viewport(0, 0, canvas.width, canvas.height);
        }

        createLightStreams();
      }

      function heartOutlinePoint(t) {
        const scale = Math.min(width, height) * (width < 760 ? 0.026 : 0.018);
        const centerX = width * 0.5;
        const centerY = height * (width < 760 ? 0.38 : 0.42);
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

        return {
          x: centerX + x * scale,
          y: centerY + y * scale
        };
      }

      function cubicPoint(stream, t) {
        const inv = 1 - t;
        const inv2 = inv * inv;
        const t2 = t * t;

        return {
          x: inv2 * inv * stream.sx + 3 * inv2 * t * stream.c1x + 3 * inv * t2 * stream.c2x + t2 * t * stream.ex,
          y: inv2 * inv * stream.sy + 3 * inv2 * t * stream.c1y + 3 * inv * t2 * stream.c2y + t2 * t * stream.ey
        };
      }

      function strokeCubicSegment(stream, from, to, alpha, widthValue) {
        const steps = 12;
        trailCtx.beginPath();

        for (let index = 0; index <= steps; index += 1) {
          const t = from + (to - from) * (index / steps);
          const point = cubicPoint(stream, t);

          if (index === 0) {
            trailCtx.moveTo(point.x, point.y);
          } else {
            trailCtx.lineTo(point.x, point.y);
          }
        }

        trailCtx.strokeStyle = `rgba(205, 232, 255, ${alpha})`;
        trailCtx.lineWidth = widthValue;
        trailCtx.lineCap = "round";
        trailCtx.stroke();
      }

      function createLightStreams() {
        lightStreams = [];
        waveLines = [];

        const baseX = width * 0.5;
        const baseY = height * (width < 760 ? 0.585 : 0.6);
        const streamCount = width < 760 ? 86 : 128;

        for (let index = 0; index < streamCount; index += 1) {
          const t = rand(0.05, Math.PI * 1.92);
          const end = heartOutlinePoint(t);
          const sway = rand(-1, 1);
          const sourceSpread = rand(-16, 16);
          const lift = height * rand(0.11, 0.24);

          lightStreams.push({
            sx: baseX + sourceSpread,
            sy: baseY + rand(-4, 8),
            c1x: baseX + sourceSpread * 1.4 + sway * rand(30, 88),
            c1y: baseY - lift,
            c2x: end.x + sway * rand(28, 76),
            c2y: end.y + rand(36, 116),
            ex: end.x + rand(-8, 8),
            ey: end.y + rand(-8, 8),
            phase: rand(0, 1),
            speed: rand(0.12, 0.23),
            alpha: rand(0.045, 0.12),
            width: rand(0.45, 1.15),
            spark: rand(1.2, 2.9)
          });
        }

        for (let index = 0; index < 11; index += 1) {
          waveLines.push({
            y: baseY + rand(-22, 28),
            amp: rand(8, 25),
            length: rand(0.008, 0.018),
            phase: rand(0, Math.PI * 2),
            speed: rand(0.0004, 0.0009),
            alpha: rand(0.035, 0.105),
            width: rand(0.45, 1.05)
          });
        }
      }

      function drawSourceGlow(baseX, baseY, time) {
        const pulse = 0.92 + Math.sin(time * 0.003) * 0.08;
        const glow = trailCtx.createRadialGradient(baseX, baseY, 0, baseX, baseY, Math.min(width, height) * 0.32);
        glow.addColorStop(0, `rgba(255, 255, 255, ${0.42 * pulse})`);
        glow.addColorStop(0.08, `rgba(202, 232, 255, ${0.2 * pulse})`);
        glow.addColorStop(0.34, "rgba(120, 196, 255, 0.055)");
        glow.addColorStop(1, "rgba(120, 196, 255, 0)");

        trailCtx.fillStyle = glow;
        trailCtx.beginPath();
        trailCtx.arc(baseX, baseY, Math.min(width, height) * 0.32, 0, Math.PI * 2);
        trailCtx.fill();

        trailCtx.strokeStyle = `rgba(235, 247, 255, ${0.42 * pulse})`;
        trailCtx.lineWidth = 1.2;
        trailCtx.beginPath();
        trailCtx.moveTo(baseX - Math.min(width, 280) * 0.44, baseY);
        trailCtx.lineTo(baseX + Math.min(width, 280) * 0.44, baseY);
        trailCtx.stroke();
      }

      function drawWaveLines(time, baseX) {
        for (const wave of waveLines) {
          trailCtx.beginPath();

          for (let x = -40; x <= width + 40; x += 12) {
            const distance = Math.abs(x - baseX) / width;
            const fade = Math.max(0.18, 1 - distance * 0.86);
            const y =
              wave.y +
              Math.sin(x * wave.length + wave.phase + time * wave.speed) * wave.amp * fade +
              Math.sin(x * wave.length * 0.42 - time * wave.speed * 1.7) * wave.amp * 0.32;

            if (x === -40) {
              trailCtx.moveTo(x, y);
            } else {
              trailCtx.lineTo(x, y);
            }
          }

          trailCtx.strokeStyle = `rgba(179, 220, 255, ${wave.alpha})`;
          trailCtx.lineWidth = wave.width;
          trailCtx.lineCap = "round";
          trailCtx.stroke();
        }
      }

      function drawLightStreams(time) {
        const baseX = width * 0.5;
        const baseY = height * (width < 760 ? 0.585 : 0.6);
        trailCtx.clearRect(0, 0, width, height);
        trailCtx.save();
        trailCtx.globalCompositeOperation = "lighter";

        drawSourceGlow(baseX, baseY, time);
        drawWaveLines(time, baseX);

        for (const stream of lightStreams) {
          trailCtx.beginPath();
          trailCtx.moveTo(stream.sx, stream.sy);
          trailCtx.bezierCurveTo(stream.c1x, stream.c1y, stream.c2x, stream.c2y, stream.ex, stream.ey);
          trailCtx.strokeStyle = `rgba(163, 209, 255, ${stream.alpha})`;
          trailCtx.lineWidth = stream.width;
          trailCtx.lineCap = "round";
          trailCtx.stroke();

          if (!prefersReducedMotion) {
            const progress = (stream.phase + time * 0.00008 * stream.speed * 60) % 1;
            const from = Math.max(0, progress - 0.08);
            const to = Math.min(1, progress + 0.02);
            const point = cubicPoint(stream, progress);
            const dot = trailCtx.createRadialGradient(point.x, point.y, 0, point.x, point.y, stream.spark * 5);

            strokeCubicSegment(stream, from, to, 0.42, stream.width + 0.9);
            dot.addColorStop(0, "rgba(255, 255, 255, 0.95)");
            dot.addColorStop(0.32, "rgba(190, 226, 255, 0.38)");
            dot.addColorStop(1, "rgba(190, 226, 255, 0)");
            trailCtx.fillStyle = dot;
            trailCtx.beginPath();
            trailCtx.arc(point.x, point.y, stream.spark * 5, 0, Math.PI * 2);
            trailCtx.fill();
          }
        }

        trailCtx.restore();
      }

      function animate(now) {
        const seconds = prefersReducedMotion ? 5 : (now - startTime) / 1000;
        drawLightStreams(now);

        if (gl) {
          gl.clearColor(0, 0, 0, 0);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.useProgram(program);
          gl.uniform2f(gl.getUniformLocation(program, "uResolution"), width, height);
          gl.uniform1f(gl.getUniformLocation(program, "uTime"), seconds);
          gl.uniform1f(gl.getUniformLocation(program, "uScale"), Math.min(width, height) * (width < 760 ? 0.395 : 0.36));
          gl.uniform1f(gl.getUniformLocation(program, "uCenterY"), height * (width < 760 ? 0.43 : 0.46));
          gl.uniform1f(gl.getUniformLocation(program, "uDpr"), dpr);
          gl.drawArrays(gl.POINTS, 0, pointCount);
        }

        requestAnimationFrame(animate);
      }

      function createStars() {
        for (let index = 0; index < 38; index += 1) {
          const star = document.createElement("span");
          star.style.setProperty("--x", `${(index * 47) % 100}%`);
          star.style.setProperty("--y", `${(index * 71) % 100}%`);
          star.style.setProperty("--s", `${1 + (index % 3) * 0.7}px`);
          star.style.setProperty("--d", `${4.5 + (index % 5) * 0.6}s`);
          star.style.setProperty("--delay", `${(index % 8) * -0.35}s`);
          starLayer.appendChild(star);
        }
      }

      createStars();
      resize();
      window.addEventListener("resize", resize);

      if (gl) {
        initWebGL();
      }

      requestAnimationFrame(animate);
    </script>
  </body>
</html>
