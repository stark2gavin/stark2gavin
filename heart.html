<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>心海花开</title>
    <meta name="description" content="一片横屏盛开的蓝白粒子爱心。" />
    <style>
      :root {
        --text: #f8fbff;
        --soft: rgba(238, 247, 255, 0.72);
        --dim: rgba(238, 247, 255, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #02050b;
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 72%, rgba(197, 230, 255, 0.12), transparent 27%),
          radial-gradient(circle at 50% 38%, rgba(93, 166, 255, 0.12), transparent 44%),
          linear-gradient(180deg, #02050b 0%, #06101a 54%, #02050b 100%);
      }

      #heartCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .back-link {
        position: absolute;
        top: max(16px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        z-index: 3;
        color: rgba(238, 247, 255, 0.7);
        font-size: 0.9rem;
        text-decoration: none;
      }

      .caption {
        position: absolute;
        right: max(24px, env(safe-area-inset-right));
        bottom: max(20px, env(safe-area-inset-bottom));
        z-index: 2;
        max-width: 21rem;
        text-align: right;
        pointer-events: none;
      }

      .caption p {
        margin: 0;
        color: var(--soft);
        font-size: clamp(0.86rem, 1.7vw, 1.05rem);
        line-height: 1.7;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
      }

      .caption strong {
        display: block;
        margin-top: 6px;
        color: #ffffff;
        font-size: clamp(0.92rem, 1.85vw, 1.12rem);
        font-weight: 800;
      }

      .rotate-tip {
        position: absolute;
        left: 50%;
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 4;
        display: none;
        width: max-content;
        max-width: calc(100vw - 40px);
        padding: 8px 12px;
        border: 1px solid rgba(238, 247, 255, 0.16);
        border-radius: 999px;
        background: rgba(2, 5, 11, 0.58);
        color: rgba(238, 247, 255, 0.72);
        font-size: 0.78rem;
        transform: translateX(-50%);
        backdrop-filter: blur(10px);
      }

      @media (orientation: portrait) {
        .caption {
          right: 20px;
          left: 20px;
          bottom: max(54px, env(safe-area-inset-bottom));
          max-width: none;
          text-align: center;
        }

        .caption p {
          font-size: 0.86rem;
        }

        .rotate-tip {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="横屏蓝白粒子爱心">
      <canvas id="heartCanvas"></canvas>
      <a class="back-link" href="./index.html">返回</a>
      <section class="caption">
        <p>
          江大美女，给你看一场光慢慢盛开。<br />
          不用急着想它是什么意思，
          <strong>就当今晚的星海，刚好偏向你。</strong>
        </p>
      </section>
      <div class="rotate-tip">横屏看会更像这束光在眼前展开</div>
    </main>

    <script>
      const canvas = document.querySelector("#heartCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let width = 0;
      let height = 0;
      let dpr = 1;
      let layout = {};
      let heartDots = [];
      let streams = [];
      let waveLines = [];
      let baseMotes = [];
      let bloomDust = [];
      let groundDust = [];
      let startTime = performance.now();

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function heartPoint(t, scale = 1, yOffset = 0) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

        return {
          x: layout.cx + x * layout.scaleX * scale,
          y: layout.cy + y * layout.scaleY * scale + yOffset
        };
      }

      function bezierPoint(curve, t) {
        const inv = 1 - t;
        const inv2 = inv * inv;
        const t2 = t * t;

        return {
          x: inv2 * inv * curve.sx + 3 * inv2 * t * curve.c1x + 3 * inv * t2 * curve.c2x + t2 * t * curve.ex,
          y: inv2 * inv * curve.sy + 3 * inv2 * t * curve.c1y + 3 * inv * t2 * curve.c2y + t2 * t * curve.ey
        };
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        createScene();
      }

      function createScene() {
        const landscape = width >= height;
        const scale = landscape ? Math.min(width / 74, height / 39) : Math.min(width / 38, height / 78);
        const scaleX = scale * (landscape ? 1.24 : 1);
        const scaleY = scale * (landscape ? 0.9 : 1);
        const baseY = landscape ? height * 0.79 : height * 0.47;

        layout = {
          landscape,
          cx: width * 0.5,
          baseX: width * 0.5,
          baseY,
          scale,
          scaleX,
          scaleY,
          cy: baseY - scaleY * 16.3
        };

        heartDots = [];
        streams = [];
        waveLines = [];
        baseMotes = [];
        bloomDust = [];
        groundDust = [];

        const dotCount = landscape ? 19000 : 10500;
        for (let index = 0; index < dotCount; index += 1) {
          const outline = Math.random() < 0.48;
          const t = rand(0, Math.PI * 2);
          const innerScale = outline ? rand(0.955, 1.07) : Math.sqrt(Math.random()) * rand(0.12, 0.95);
          const point = heartPoint(t, innerScale, rand(-1.8, 1.8));
          const tip = clamp((point.y - (layout.baseY - layout.scaleY * 4.8)) / (layout.scaleY * 5.9), 0, 1);
          const outwardX = point.x - layout.cx;
          const outwardY = point.y - layout.cy;
          const spreadSide = Math.random() < 0.5 ? -1 : 1;
          const groundSpread = Math.pow(tip, 1.65);
          const targetX =
            point.x +
            spreadSide * groundSpread * rand(width * 0.07, width * 0.34) +
            rand(-width * 0.03, width * 0.03) * tip;
          const targetY = point.y + groundSpread * rand(-height * 0.035, height * 0.145);

          heartDots.push({
            sx: layout.baseX + rand(-34, 34),
            sy: layout.baseY + rand(-8, 8),
            x: targetX,
            y: targetY,
            bloomX: outwardX * rand(0.018, 0.075) + spreadSide * groundSpread * rand(26, 82),
            bloomY: outwardY * rand(0.012, 0.05) + groundSpread * rand(12, 46),
            size: rand(outline ? 0.24 : 0.16, outline ? 0.82 : 0.56),
            alpha: rand(outline ? 0.18 : 0.07, outline ? 0.58 : 0.32) * (1 - tip * 0.62),
            phase: rand(0, Math.PI * 2),
            delay: rand(0, 0.58),
            white: Math.random() < 0.28
          });
        }

        const dustCount = landscape ? 9800 : 5600;
        for (let index = 0; index < dustCount; index += 1) {
          let t = rand(Math.PI * 0.08, Math.PI * 1.92);
          if (Math.abs(t - Math.PI) < 0.32 && Math.random() < 0.82) {
            t += (t < Math.PI ? -1 : 1) * rand(0.32, 0.72);
          }
          const outerScale = rand(1.02, 1.34);
          const point = heartPoint(t, outerScale, rand(-8, 18));
          const outwardX = point.x - layout.cx;
          const outwardY = point.y - layout.cy;

          bloomDust.push({
            sx: layout.baseX + rand(-42, 42),
            sy: layout.baseY + rand(-12, 8),
            x: point.x + outwardX * rand(0.02, 0.1),
            y: point.y + outwardY * rand(0.01, 0.07),
            size: rand(0.18, Math.random() > 0.9 ? 0.86 : 0.54),
            alpha: rand(0.06, Math.random() > 0.9 ? 0.34 : 0.2),
            phase: rand(0, Math.PI * 2),
            delay: rand(0, 0.72),
            white: Math.random() < 0.34
          });
        }

        const streamCount = landscape ? 820 : 470;
        for (let index = 0; index < streamCount; index += 1) {
          let t = rand(0.02, Math.PI * 1.98);
          if (Math.abs(t - Math.PI) < 0.36 && Math.random() < 0.86) {
            t += (t < Math.PI ? -1 : 1) * rand(0.36, 0.84);
          }
          const overshoot = Math.random() < 0.56 ? rand(1.1, 1.52) : rand(0.84, 1.08);
          const end = heartPoint(t, overshoot, rand(-4, 10));
          const side = end.x - layout.baseX;
          const arc = rand(-1, 1);
          const launchX = layout.baseX + side * rand(0.08, 0.38) + rand(-width * 0.08, width * 0.08);

          streams.push({
            sx: launchX,
            sy: layout.baseY + rand(-7, 9),
            c1x: launchX + side * rand(0.08, 0.24) + arc * rand(18, 72),
            c1y: layout.baseY - height * rand(0.1, 0.24),
            c2x: end.x - side * rand(0.08, 0.24) + arc * rand(18, 82),
            c2y: end.y + height * rand(0.05, 0.18),
            ex: end.x + rand(-10, 10),
            ey: end.y + rand(-10, 10),
            width: rand(0.22, 0.68),
            alpha: rand(0.018, 0.068),
            phase: rand(0, 1),
            speed: rand(0.08, 0.18),
            delay: rand(0, 0.62),
            beads: Array.from({ length: landscape ? 11 : 7 }, () => ({
              t: rand(0.14, 0.98),
              r: rand(0.18, 0.78),
              alpha: rand(0.06, 0.26),
              phase: rand(0, Math.PI * 2)
            }))
          });
        }

        const waveCount = landscape ? 58 : 34;
        for (let index = 0; index < waveCount; index += 1) {
          waveLines.push({
            y: layout.baseY + rand(-height * 0.08, height * 0.08),
            amp: rand(height * 0.012, height * 0.05),
            freq: rand(0.006, 0.018),
            phase: rand(0, Math.PI * 2),
            speed: rand(0.00035, 0.0009),
            alpha: rand(0.028, 0.105),
            width: rand(0.24, 0.82)
          });
        }

        const moteCount = landscape ? 3600 : 1900;
        for (let index = 0; index < moteCount; index += 1) {
          baseMotes.push({
            x: rand(0, width),
            y: layout.baseY + rand(-height * 0.05, height * 0.1),
            r: rand(0.35, 1.6),
            alpha: rand(0.05, 0.3),
            phase: rand(0, Math.PI * 2)
          });
        }

        const groundCount = landscape ? 9200 : 4800;
        for (let index = 0; index < groundCount; index += 1) {
          const side = Math.random() < 0.5 ? -1 : 1;
          const distance = Math.pow(Math.random(), 0.68) * width * (landscape ? 0.58 : 0.46);
          const x = layout.baseX + side * distance + rand(-18, 18);
          const y = layout.baseY + rand(-height * 0.075, height * 0.12);
          const fade = 1 - Math.min(1, Math.abs(x - layout.baseX) / (width * 0.62));

          groundDust.push({
            sx: layout.baseX + rand(-28, 28),
            sy: layout.baseY + rand(-8, 10),
            x,
            y,
            r: rand(0.16, Math.random() > 0.9 ? 0.78 : 0.46),
            alpha: rand(0.04, 0.2) * (0.35 + fade * 0.65),
            phase: rand(0, Math.PI * 2),
            delay: rand(0, 0.68),
            white: Math.random() < 0.26
          });
        }
      }

      function drawBackground(time) {
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "#02050b");
        gradient.addColorStop(0.46, "#06101a");
        gradient.addColorStop(1, "#02050b");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(layout.cx, layout.cy + layout.scale * 6, 0, layout.cx, layout.cy, Math.min(width, height) * 0.58);
        glow.addColorStop(0, "rgba(104, 179, 255, 0.16)");
        glow.addColorStop(0.45, "rgba(104, 179, 255, 0.045)");
        glow.addColorStop(1, "rgba(104, 179, 255, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        const starCount = layout.landscape ? 150 : 86;

        for (let index = 0; index < starCount; index += 1) {
          const x = (index * 97) % width;
          const y = (index * 53) % height;
          const pulse = 0.32 + Math.sin(time * 0.0014 + index) * 0.18;
          ctx.fillStyle = `rgba(214, 235, 255, ${pulse * 0.26})`;
          ctx.beginPath();
          ctx.arc(x, y, 0.45 + (index % 3) * 0.24, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawWaveLines(time) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const wave of waveLines) {
          ctx.beginPath();

          for (let x = -30; x <= width + 30; x += 8) {
            const centerFade = 0.35 + 0.65 * Math.exp(-Math.pow((x - layout.cx) / (width * 0.34), 2));
            const y =
              wave.y +
              Math.sin(x * wave.freq + wave.phase + time * wave.speed) * wave.amp * centerFade +
              Math.sin(x * wave.freq * 0.42 - time * wave.speed * 1.9) * wave.amp * 0.38;

            if (x === -30) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }

          ctx.strokeStyle = `rgba(181, 221, 255, ${wave.alpha})`;
          ctx.lineWidth = wave.width;
          ctx.lineCap = "round";
          ctx.stroke();
        }

        for (const mote of baseMotes) {
          const twinkle = 0.55 + Math.sin(time * 0.002 + mote.phase) * 0.35;
          ctx.fillStyle = `rgba(224, 242, 255, ${mote.alpha * twinkle})`;
          ctx.beginPath();
          ctx.arc(mote.x, mote.y + Math.sin(time * 0.001 + mote.phase) * 2, mote.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function strokeBezierSegment(curve, from, to, alpha, widthValue) {
        const steps = 18;
        ctx.beginPath();

        for (let index = 0; index <= steps; index += 1) {
          const t = from + (to - from) * (index / steps);
          const point = bezierPoint(curve, t);

          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        }

        ctx.strokeStyle = `rgba(188, 228, 255, ${alpha})`;
        ctx.lineWidth = widthValue;
        ctx.lineCap = "round";
        ctx.stroke();
      }

      function drawTinyLight(x, y, radius, alpha, white = false) {
        ctx.fillStyle = white ? `rgba(255, 255, 255, ${alpha})` : `rgba(188, 228, 255, ${alpha})`;

        if (radius < 0.72) {
          ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
          return;
        }

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawStreams(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const stream of streams) {
          const reveal = prefersReducedMotion ? 1 : easeOutCubic(clamp(elapsed / 2.5 - stream.delay * 0.58, 0, 1));
          strokeBezierSegment(stream, 0, reveal, stream.alpha, stream.width);

          for (const bead of stream.beads) {
            if (bead.t > reveal) {
              continue;
            }

            const beadPoint = bezierPoint(stream, bead.t);
            const pulse = 0.58 + Math.sin(time * 0.003 + bead.phase) * 0.3;
            drawTinyLight(beadPoint.x, beadPoint.y, bead.r, bead.alpha * Math.max(0.2, pulse), true);
          }

          const head = Math.min(reveal, (stream.phase + time * 0.000075 * stream.speed * 60) % 1);
          const from = clamp(head - 0.08, 0, 1);
          const to = clamp(head + 0.018, 0, 1);
          const point = bezierPoint(stream, head);

          strokeBezierSegment(stream, from, to, 0.24, stream.width + 0.45);

          const dotGlow = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 5.5);
          dotGlow.addColorStop(0, "rgba(255, 255, 255, 0.82)");
          dotGlow.addColorStop(0.36, "rgba(196, 230, 255, 0.24)");
          dotGlow.addColorStop(1, "rgba(196, 230, 255, 0)");
          ctx.fillStyle = dotGlow;
          ctx.beginPath();
          ctx.arc(point.x, point.y, 5.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawBloomDust(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const dot of bloomDust) {
          const reveal = prefersReducedMotion ? 1 : easeOutCubic(clamp(elapsed / 2.7 - dot.delay * 0.42, 0, 1));
          const floatX = Math.sin(time * 0.0012 + dot.phase) * (0.8 + dot.size * 1.2);
          const floatY = Math.cos(time * 0.001 + dot.phase) * (0.55 + dot.size);
          const x = dot.sx + (dot.x - dot.sx) * reveal + floatX;
          const y = dot.sy + (dot.y - dot.sy) * reveal + floatY;
          const twinkle = 0.6 + Math.sin(time * 0.0034 + dot.phase) * 0.3;
          const alpha = dot.alpha * reveal * Math.max(0.18, twinkle);
          const radius = dot.size * (0.72 + reveal * 0.42);

          drawTinyLight(x, y, radius, alpha, dot.white);
        }

        ctx.restore();
      }

      function drawGroundDust(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const dot of groundDust) {
          const reveal = prefersReducedMotion ? 1 : easeOutCubic(clamp(elapsed / 2.4 - dot.delay * 0.38, 0, 1));
          const x = dot.sx + (dot.x - dot.sx) * reveal + Math.sin(time * 0.001 + dot.phase) * 1.8;
          const y = dot.sy + (dot.y - dot.sy) * reveal + Math.cos(time * 0.0013 + dot.phase) * 0.9;
          const twinkle = 0.55 + Math.sin(time * 0.0028 + dot.phase) * 0.28;
          const alpha = dot.alpha * reveal * Math.max(0.16, twinkle);

          drawTinyLight(x, y, dot.r * (0.8 + reveal * 0.36), alpha, dot.white);
        }

        ctx.restore();
      }

      function drawHeartDots(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const dot of heartDots) {
          const reveal = prefersReducedMotion ? 1 : easeOutCubic(clamp(elapsed / 2.35 - dot.delay * 0.52, 0, 1));
          const drift = Math.sin(time * 0.0014 + dot.phase) * 0.55;
          const x = dot.sx + (dot.x + dot.bloomX * drift - dot.sx) * reveal;
          const y = dot.sy + (dot.y + dot.bloomY * drift - dot.sy) * reveal;
          const twinkle = 0.68 + Math.sin(time * 0.003 + dot.phase) * 0.28;
          const alpha = dot.alpha * reveal * Math.max(0.18, twinkle);
          const radius = dot.size * (0.78 + reveal * 0.45);

          drawTinyLight(x, y, radius, alpha, dot.white);

          if (dot.white && radius > 0.86) {
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.18})`;
            ctx.beginPath();
            ctx.arc(x, y, radius * 2.8, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.restore();
      }

      function drawSource(time) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        const pulse = 0.92 + Math.sin(time * 0.003) * 0.08;
        const radius = Math.min(width, height) * 0.22;
        const glow = ctx.createRadialGradient(layout.baseX, layout.baseY, 0, layout.baseX, layout.baseY, radius);
        glow.addColorStop(0, `rgba(255, 255, 255, ${0.36 * pulse})`);
        glow.addColorStop(0.08, `rgba(204, 232, 255, ${0.2 * pulse})`);
        glow.addColorStop(0.28, "rgba(114, 190, 255, 0.08)");
        glow.addColorStop(1, "rgba(114, 190, 255, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(layout.baseX, layout.baseY, radius, 0, Math.PI * 2);
        ctx.fill();

        const line = ctx.createLinearGradient(0, layout.baseY, width, layout.baseY);
        line.addColorStop(0, "rgba(130, 206, 255, 0)");
        line.addColorStop(0.28, "rgba(206, 236, 255, 0.36)");
        line.addColorStop(0.5, "rgba(255, 255, 255, 0.52)");
        line.addColorStop(0.72, "rgba(206, 236, 255, 0.36)");
        line.addColorStop(1, "rgba(130, 206, 255, 0)");
        ctx.strokeStyle = line;
        ctx.lineWidth = Math.max(1, Math.min(width, height) * 0.006);
        ctx.beginPath();
        ctx.moveTo(0, layout.baseY);
        ctx.lineTo(width, layout.baseY);
        ctx.stroke();

        ctx.restore();
      }

      function drawVignette() {
        const left = ctx.createLinearGradient(0, 0, width * 0.18, 0);
        left.addColorStop(0, "rgba(0, 0, 0, 0.62)");
        left.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = left;
        ctx.fillRect(0, 0, width * 0.18, height);

        const right = ctx.createLinearGradient(width, 0, width * 0.82, 0);
        right.addColorStop(0, "rgba(0, 0, 0, 0.62)");
        right.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = right;
        ctx.fillRect(width * 0.82, 0, width * 0.18, height);
      }

      function animate(now) {
        const elapsed = prefersReducedMotion ? 4 : (now - startTime) / 1000;
        drawBackground(now);
        drawWaveLines(now);
        drawStreams(now, elapsed);
        drawGroundDust(now, elapsed);
        drawBloomDust(now, elapsed);
        drawHeartDots(now, elapsed);
        drawSource(now);
        drawVignette();
        requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener("resize", resize);
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
