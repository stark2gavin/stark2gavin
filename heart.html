<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>心海花开</title>
    <meta name="description" content="一片横屏盛开的蓝白粒子爱心。" />
    <style>
      :root {
        --text: #f8fbff;
        --soft: rgba(238, 247, 255, 0.72);
        --dim: rgba(238, 247, 255, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #02050b;
        color: var(--text);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 72%, rgba(197, 230, 255, 0.12), transparent 27%),
          radial-gradient(circle at 50% 38%, rgba(93, 166, 255, 0.12), transparent 44%),
          linear-gradient(180deg, #02050b 0%, #06101a 54%, #02050b 100%);
      }

      #heartCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .back-link {
        position: absolute;
        top: max(16px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        z-index: 3;
        color: rgba(238, 247, 255, 0.7);
        font-size: 0.9rem;
        text-decoration: none;
      }

      .caption {
        position: absolute;
        right: max(24px, env(safe-area-inset-right));
        bottom: max(20px, env(safe-area-inset-bottom));
        z-index: 2;
        max-width: 21rem;
        text-align: right;
        pointer-events: none;
      }

      .caption p {
        margin: 0;
        color: var(--soft);
        font-size: clamp(0.86rem, 1.7vw, 1.05rem);
        line-height: 1.7;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
      }

      .caption strong {
        display: block;
        margin-top: 6px;
        color: #ffffff;
        font-size: clamp(0.92rem, 1.85vw, 1.12rem);
        font-weight: 800;
      }

      .rotate-tip {
        position: absolute;
        left: 50%;
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 4;
        display: none;
        width: max-content;
        max-width: calc(100vw - 40px);
        padding: 8px 12px;
        border: 1px solid rgba(238, 247, 255, 0.16);
        border-radius: 999px;
        background: rgba(2, 5, 11, 0.58);
        color: rgba(238, 247, 255, 0.72);
        font-size: 0.78rem;
        transform: translateX(-50%);
        backdrop-filter: blur(10px);
      }

      @media (orientation: portrait) {
        .caption {
          right: 20px;
          left: 20px;
          bottom: max(54px, env(safe-area-inset-bottom));
          max-width: none;
          text-align: center;
        }

        .caption p {
          font-size: 0.86rem;
        }

        .rotate-tip {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="横屏蓝白粒子爱心">
      <canvas id="heartCanvas"></canvas>
      <a class="back-link" href="./index.html">返回</a>
      <section class="caption">
        <p>
          江大美女，给你看一束光。<br />
          它会从夜色里慢慢盛开，
          <strong>像刚好被你撞见的温柔。</strong>
        </p>
      </section>
      <div class="rotate-tip">横屏看会更像这束光在眼前展开</div>
    </main>

    <script>
      const canvas = document.querySelector("#heartCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let width = 0;
      let height = 0;
      let dpr = 1;
      let layout = {};
      let heartDots = [];
      let streams = [];
      let waveLines = [];
      let baseMotes = [];
      let startTime = performance.now();

      const codeLines = [
        "this.length = 1; // 光",
        "this.angle += speed;",
        "this.color = '#bfe8ff';",
        "heart.init();",
        "particle.alpha *= 0.98;",
        "wave.draw(ctx);",
        "let x = Math.random();",
        "const love = new Light();"
      ];

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function heartPoint(t, scale = 1, yOffset = 0) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

        return {
          x: layout.cx + x * layout.scaleX * scale,
          y: layout.cy + y * layout.scaleY * scale + yOffset
        };
      }

      function bezierPoint(curve, t) {
        const inv = 1 - t;
        const inv2 = inv * inv;
        const t2 = t * t;

        return {
          x: inv2 * inv * curve.sx + 3 * inv2 * t * curve.c1x + 3 * inv * t2 * curve.c2x + t2 * t * curve.ex,
          y: inv2 * inv * curve.sy + 3 * inv2 * t * curve.c1y + 3 * inv * t2 * curve.c2y + t2 * t * curve.ey
        };
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        createScene();
      }

      function createScene() {
        const landscape = width >= height;
        const scale = landscape ? Math.min(width / 74, height / 39) : Math.min(width / 38, height / 78);
        const scaleX = scale * (landscape ? 1.24 : 1);
        const scaleY = scale * (landscape ? 0.9 : 1);
        const baseY = landscape ? height * 0.79 : height * 0.47;

        layout = {
          landscape,
          cx: width * 0.5,
          baseX: width * 0.5,
          baseY,
          scale,
          scaleX,
          scaleY,
          cy: baseY - scaleY * 16.3
        };

        heartDots = [];
        streams = [];
        waveLines = [];
        baseMotes = [];

        const dotCount = landscape ? 3600 : 2100;
        for (let index = 0; index < dotCount; index += 1) {
          const outline = Math.random() < 0.72;
          const t = rand(0, Math.PI * 2);
          const innerScale = outline ? rand(0.965, 1.055) : Math.sqrt(Math.random()) * rand(0.18, 0.9);
          const point = heartPoint(t, innerScale, rand(-1.8, 1.8));
          const outwardX = point.x - layout.cx;
          const outwardY = point.y - layout.cy;

          heartDots.push({
            sx: layout.baseX + rand(-34, 34),
            sy: layout.baseY + rand(-8, 8),
            x: point.x,
            y: point.y,
            bloomX: outwardX * rand(0.015, 0.055),
            bloomY: outwardY * rand(0.01, 0.04),
            size: rand(outline ? 0.48 : 0.34, outline ? 1.45 : 0.9),
            alpha: rand(outline ? 0.32 : 0.12, outline ? 0.82 : 0.42),
            phase: rand(0, Math.PI * 2),
            delay: rand(0, 0.88),
            white: Math.random() < 0.22
          });
        }

        const streamCount = landscape ? 260 : 150;
        for (let index = 0; index < streamCount; index += 1) {
          const t = rand(0.02, Math.PI * 1.98);
          const overshoot = Math.random() < 0.38 ? rand(1.04, 1.38) : rand(0.82, 1.04);
          const end = heartPoint(t, overshoot, rand(-4, 10));
          const side = end.x - layout.baseX;
          const arc = rand(-1, 1);

          streams.push({
            sx: layout.baseX + rand(-20, 20),
            sy: layout.baseY + rand(-5, 7),
            c1x: layout.baseX + side * rand(0.08, 0.32) + arc * rand(18, 72),
            c1y: layout.baseY - height * rand(0.1, 0.24),
            c2x: end.x - side * rand(0.08, 0.24) + arc * rand(18, 82),
            c2y: end.y + height * rand(0.05, 0.18),
            ex: end.x + rand(-10, 10),
            ey: end.y + rand(-10, 10),
            width: rand(0.28, 0.9),
            alpha: rand(0.026, 0.09),
            phase: rand(0, 1),
            speed: rand(0.08, 0.18),
            delay: rand(0, 0.62)
          });
        }

        const waveCount = landscape ? 24 : 14;
        for (let index = 0; index < waveCount; index += 1) {
          waveLines.push({
            y: layout.baseY + rand(-height * 0.08, height * 0.08),
            amp: rand(height * 0.012, height * 0.05),
            freq: rand(0.006, 0.018),
            phase: rand(0, Math.PI * 2),
            speed: rand(0.00035, 0.0009),
            alpha: rand(0.035, 0.12),
            width: rand(0.32, 1.0)
          });
        }

        const moteCount = landscape ? 520 : 260;
        for (let index = 0; index < moteCount; index += 1) {
          baseMotes.push({
            x: rand(0, width),
            y: layout.baseY + rand(-height * 0.05, height * 0.1),
            r: rand(0.35, 1.6),
            alpha: rand(0.05, 0.3),
            phase: rand(0, Math.PI * 2)
          });
        }
      }

      function drawBackground(time) {
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "#02050b");
        gradient.addColorStop(0.46, "#06101a");
        gradient.addColorStop(1, "#02050b");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(layout.cx, layout.cy + layout.scale * 6, 0, layout.cx, layout.cy, Math.min(width, height) * 0.58);
        glow.addColorStop(0, "rgba(104, 179, 255, 0.16)");
        glow.addColorStop(0.45, "rgba(104, 179, 255, 0.045)");
        glow.addColorStop(1, "rgba(104, 179, 255, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = layout.landscape ? 0.26 : 0.12;
        ctx.font = `${Math.max(10, Math.min(width, height) * 0.032)}px Consolas, monospace`;
        ctx.fillStyle = "rgba(116, 193, 255, 0.72)";
        const left = Math.max(18, width * 0.045);
        const top = Math.max(18, height * 0.08);
        const lineHeight = Math.max(14, Math.min(width, height) * 0.045);

        for (let index = 0; index < 15; index += 1) {
          const text = codeLines[index % codeLines.length];
          ctx.fillStyle = index % 3 === 0 ? "rgba(255, 214, 148, 0.54)" : "rgba(126, 205, 255, 0.52)";
          ctx.fillText(text, left + (index % 2) * 18, top + index * lineHeight);
        }
        ctx.restore();
      }

      function drawWaveLines(time) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const wave of waveLines) {
          ctx.beginPath();

          for (let x = -30; x <= width + 30; x += 8) {
            const centerFade = 0.35 + 0.65 * Math.exp(-Math.pow((x - layout.cx) / (width * 0.34), 2));
            const y =
              wave.y +
              Math.sin(x * wave.freq + wave.phase + time * wave.speed) * wave.amp * centerFade +
              Math.sin(x * wave.freq * 0.42 - time * wave.speed * 1.9) * wave.amp * 0.38;

            if (x === -30) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }

          ctx.strokeStyle = `rgba(181, 221, 255, ${wave.alpha})`;
          ctx.lineWidth = wave.width;
          ctx.lineCap = "round";
          ctx.stroke();
        }

        for (const mote of baseMotes) {
          const twinkle = 0.55 + Math.sin(time * 0.002 + mote.phase) * 0.35;
          ctx.fillStyle = `rgba(224, 242, 255, ${mote.alpha * twinkle})`;
          ctx.beginPath();
          ctx.arc(mote.x, mote.y + Math.sin(time * 0.001 + mote.phase) * 2, mote.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function strokeBezierSegment(curve, from, to, alpha, widthValue) {
        const steps = 18;
        ctx.beginPath();

        for (let index = 0; index <= steps; index += 1) {
          const t = from + (to - from) * (index / steps);
          const point = bezierPoint(curve, t);

          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        }

        ctx.strokeStyle = `rgba(188, 228, 255, ${alpha})`;
        ctx.lineWidth = widthValue;
        ctx.lineCap = "round";
        ctx.stroke();
      }

      function drawStreams(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const stream of streams) {
          const reveal = prefersReducedMotion ? 1 : easeOutCubic(clamp(elapsed / 2.5 - stream.delay * 0.58, 0, 1));
          strokeBezierSegment(stream, 0, reveal, stream.alpha, stream.width);

          const head = Math.min(reveal, (stream.phase + time * 0.000075 * stream.speed * 60) % 1);
          const from = clamp(head - 0.08, 0, 1);
          const to = clamp(head + 0.018, 0, 1);
          const point = bezierPoint(stream, head);

          strokeBezierSegment(stream, from, to, 0.36, stream.width + 0.72);

          const dotGlow = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 8);
          dotGlow.addColorStop(0, "rgba(255, 255, 255, 0.94)");
          dotGlow.addColorStop(0.36, "rgba(196, 230, 255, 0.32)");
          dotGlow.addColorStop(1, "rgba(196, 230, 255, 0)");
          ctx.fillStyle = dotGlow;
          ctx.beginPath();
          ctx.arc(point.x, point.y, 8, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawHeartDots(time, elapsed) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const dot of heartDots) {
          const reveal = prefersReducedMotion ? 1 : easeOutCubic(clamp(elapsed / 2.35 - dot.delay * 0.52, 0, 1));
          const drift = Math.sin(time * 0.0014 + dot.phase) * 0.55;
          const x = dot.sx + (dot.x + dot.bloomX * drift - dot.sx) * reveal;
          const y = dot.sy + (dot.y + dot.bloomY * drift - dot.sy) * reveal;
          const twinkle = 0.68 + Math.sin(time * 0.003 + dot.phase) * 0.28;
          const alpha = dot.alpha * reveal * Math.max(0.18, twinkle);
          const radius = dot.size * (0.78 + reveal * 0.45);

          ctx.fillStyle = dot.white ? `rgba(255, 255, 255, ${alpha})` : `rgba(186, 226, 255, ${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();

          if (dot.white && radius > 1.05) {
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.18})`;
            ctx.beginPath();
            ctx.arc(x, y, radius * 2.8, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.restore();
      }

      function drawSource(time) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        const pulse = 0.92 + Math.sin(time * 0.003) * 0.08;
        const radius = Math.min(width, height) * 0.3;
        const glow = ctx.createRadialGradient(layout.baseX, layout.baseY, 0, layout.baseX, layout.baseY, radius);
        glow.addColorStop(0, `rgba(255, 255, 255, ${0.78 * pulse})`);
        glow.addColorStop(0.08, `rgba(204, 232, 255, ${0.34 * pulse})`);
        glow.addColorStop(0.28, "rgba(114, 190, 255, 0.12)");
        glow.addColorStop(1, "rgba(114, 190, 255, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(layout.baseX, layout.baseY, radius, 0, Math.PI * 2);
        ctx.fill();

        const line = ctx.createLinearGradient(0, layout.baseY, width, layout.baseY);
        line.addColorStop(0, "rgba(130, 206, 255, 0)");
        line.addColorStop(0.34, "rgba(206, 236, 255, 0.42)");
        line.addColorStop(0.5, "rgba(255, 255, 255, 0.88)");
        line.addColorStop(0.66, "rgba(206, 236, 255, 0.42)");
        line.addColorStop(1, "rgba(130, 206, 255, 0)");
        ctx.strokeStyle = line;
        ctx.lineWidth = Math.max(1, Math.min(width, height) * 0.006);
        ctx.beginPath();
        ctx.moveTo(0, layout.baseY);
        ctx.lineTo(width, layout.baseY);
        ctx.stroke();

        ctx.restore();
      }

      function drawVignette() {
        const left = ctx.createLinearGradient(0, 0, width * 0.18, 0);
        left.addColorStop(0, "rgba(0, 0, 0, 0.62)");
        left.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = left;
        ctx.fillRect(0, 0, width * 0.18, height);

        const right = ctx.createLinearGradient(width, 0, width * 0.82, 0);
        right.addColorStop(0, "rgba(0, 0, 0, 0.62)");
        right.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = right;
        ctx.fillRect(width * 0.82, 0, width * 0.18, height);
      }

      function animate(now) {
        const elapsed = prefersReducedMotion ? 4 : (now - startTime) / 1000;
        drawBackground(now);
        drawWaveLines(now);
        drawStreams(now, elapsed);
        drawHeartDots(now, elapsed);
        drawSource(now);
        drawVignette();
        requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener("resize", resize);
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
